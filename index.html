// ============ S4: Completion heatmap + Tickets funnel ============
function renderCompletionHeatmap(){
  const el = document.getElementById('completionHeatmap');
  if(!el) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const dayOfWeek = today.getDay(); // 0=Sun
  const startMonday = new Date(today);
  startMonday.setDate(today.getDate() - ((dayOfWeek + 6) % 7) - 11 * 7);
  const weeks = [];
  for(let w = 0; w < 12; w++){
    const week = [];
    for(let d = 0; d < 7; d++){
      const day = new Date(startMonday);
      day.setDate(startMonday.getDate() + w * 7 + d);
      const ds = day.toISOString().split('T')[0];
      const allItems = (RESERVATIONS||[]).concat(extraCleanings||[]);
      let dones = 0, total = 0;
      allItems.forEach(r => {
        const co = r.co || r.cleaning_date;
        if(co !== ds) return;
        const k = keyFor(r);
        if(cancelled[k]) return;
        total++;
        if(done[k]) dones++;
      });
      week.push({ date: ds, done: dones, total: total, isPast: day < today });
    }
    weeks.push(week);
  }
  let html = '<div class="hm-grid">';
  html += '<div class="hm-days">';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    html += '<div class="hm-day">'+d+'</div>';
  });
  html += '</div>';
  html += '<div class="hm-weeks">';
  weeks.forEach(week => {
    html += '<div class="hm-week">';
    week.forEach(cell => {
      const ratio = cell.total > 0 ? cell.done / cell.total : 0;
      let bg;
      if(cell.total === 0) bg = 'var(--bg-3)';
      else if(ratio >= 0.95) bg = 'var(--green)';
      else if(ratio >= 0.7) bg = 'rgba(92,128,96,0.6)';
      else if(ratio >= 0.4) bg = 'var(--green-light)';
      else bg = 'var(--red-light)';
      const tooltip = cell.date+' · '+cell.done+'/'+cell.total+' done';
      html += '<div class="hm-cell" style="background:'+bg+'" title="'+esc(tooltip)+'"></div>';
    });
    html += '</div>';
  });
  html += '</div>';
  html += '</div>';
  el.innerHTML = html;
}

function renderTicketsFunnel(){
  const el = document.getElementById('ticketsFunnel');
  if(!el) return;
  const month = (typeof dashYear !== 'undefined' && typeof dashMonth !== 'undefined')
    ? dashYear + '-' + String(dashMonth + 1).padStart(2, '0')
    : new Date().toISOString().slice(0,7);
  const all = (maintenanceTickets || []).concat(resolvedTickets || []);
  const inMonth = all.filter(t => {
    const c = String(t.created_at || '');
    return c.startsWith(month);
  });
  const created = inMonth.length;
  const assigned = inMonth.filter(t => t.assigned_technician_id || t.assigned_vendor_id).length;
  const inProgress = inMonth.filter(t => ['in_progress','waiting_parts','resolved'].includes(t.status)).length;
  const resolved = inMonth.filter(t => t.status === 'resolved').length;
  const stages = [
    { label: 'Created', n: created, color: 'var(--blue)' },
    { label: 'Assigned', n: assigned, color: 'var(--orange)' },
    { label: 'In progress', n: inProgress, color: 'var(--amber)' },
    { label: 'Resolved', n: resolved, color: 'var(--green)' }
  ];
  let html = '<div class="funnel-chart">';
  const max = Math.max(1, stages[0].n, stages[1].n, stages[2].n, stages[3].n);
  stages.forEach((s, i) => {
    const pct = (s.n / max) * 100;
    const ratio = i > 0 ? (stages[i-1].n > 0 ? (s.n / stages[i-1].n * 100) : 0) : 100;
    html += '<div class="funnel-row">';
    html += '<div class="funnel-label">'+esc(s.label)+'</div>';
    html += '<div class="funnel-bar-wrap">';
    html += '<div class="funnel-bar" style="width:'+pct+'%;background:'+s.color+'"></div>';
    html += '<span class="funnel-count">'+s.n+'</span>';
    html += '</div>';
    if(i > 0) html += '<div class="funnel-ratio">'+(ratio.toFixed(0))+'%</div>';
    else html += '<div class="funnel-ratio">—</div>';
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

// Property heatmap
async function loadPropertyHeatmap(){
  const el=document.getElementById('heatmapContent');
  if(!el) return;
  try{
    const r=await api('getPropertyHeatmap');
    if(r.status!=='success'){ el.innerHTML='<div class="empty">Loading error</div>'; return; }
    const props=r.properties||[];
    if(props.length===0){ el.innerHTML='<div class="empty">No properties</div>'; return; }
    el.innerHTML = '<div class="heatmap-grid">'+
      props.map(p => {
        const scoreColor = p.score >= 80 ? '#059669' : p.score >= 60 ? '#d97706' : '#dc2626';
        const bgGradient = p.score >= 80 ? 'linear-gradient(135deg, rgba(5,150,105,0.08) 0%, rgba(16,185,129,0.04) 100%)'
                         : p.score >= 60 ? 'linear-gradient(135deg, rgba(217,119,6,0.08) 0%, rgba(245,158,11,0.04) 100%)'
                         : 'linear-gradient(135deg, rgba(220,38,38,0.1) 0%, rgba(239,68,68,0.05) 100%)';
        return '<div class="heatmap-card" style="background:'+bgGradient+'; border-color:'+scoreColor+'40">'+
          '<div class="hm-header">'+
            '<div class="hm-name">'+esc(p.listing_name)+'</div>'+
            '<div class="hm-score" style="background:'+scoreColor+'">'+p.score+'</div>'+
          '</div>'+
          '<div class="hm-stats">'+
            '<div class="hm-stat"><span class="hm-stat-icon">'+icon('wrench',14)+'</span><span class="hm-stat-val">'+p.open_tickets+'</span><span class="hm-stat-lbl">open</span></div>'+
            (p.urgent_tickets>0 ? '<div class="hm-stat"><span class="hm-stat-icon">'+icon('siren',14)+'</span><span class="hm-stat-val urgent">'+p.urgent_tickets+'</span><span class="hm-stat-lbl">urgent</span></div>' : '')+
            '<div class="hm-stat"><span class="hm-stat-icon">'+icon('dollar',14)+'</span><span class="hm-stat-val">'+(p.total_cost>0?Math.round(p.total_cost):'—')+'</span><span class="hm-stat-lbl">AED</span></div>'+
            (p.avg_rating!=null ? '<div class="hm-stat"><span class="hm-stat-icon">⭐</span><span class="hm-stat-val">'+p.avg_rating+'</span><span class="hm-stat-lbl">('+p.feedback_count+')</span></div>' : '')+
          '</div>'+
        '</div>';
      }).join('')+
    '</div>';
  }catch(e){ el.innerHTML='<div class="empty">Error: '+e.message+'</div>'; }
}

  const today=new Date().toISOString().split('T')[0];

  if(recurringTasks.length===0) h+='<div class="empty-hero" style="padding:40px 20px"><div class="empty-hero-icon">'+icon('repeat',56)+'</div><div class="empty-hero-title">No recurring tasks</div><div class="empty-hero-sub">Automate deep cleans, filter changes, etc. Fill in the form above.</div></div>';
  recurringTasks.forEach(task=>{
    const dueDate=task.next_due_at?task.next_due_at.split('T')[0]:null;
    let dueClass='upcoming',dueLabel='';
    if(dueDate){
      if(dueDate<today){dueClass='overdue';dueLabel='⚠️ Overdue';}
      else if(dueDate===today){dueClass='today';dueLabel='📌 Due Today';}
      else{const days=Math.ceil((new Date(dueDate)-new Date(today))/(86400000));dueLabel='In '+days+' days';}
    }
    h+='<div class="recurring-card">';
    h+='<div class="recurring-info"><div class="recurring-name">'+esc(task.task_name)+'</div>';
    h+='<div class="recurring-meta">';
    if(task.description)h+=esc(task.description)+' · ';
    h+='Every '+task.frequency_days+' days';
    if(task.listing_id){const lr=RESERVATIONS.find(r=>r.listingId==task.listing_id);if(lr)h+=' · 🏠 '+esc(lr.listing);}
    if(task.assigned_cleaner_id){const cl=getCleanerById(task.assigned_cleaner_id);if(cl)h+=' · 👤 '+esc(cl.name);}
    h+='</div>';
    if(task.last_done_at)h+='<div class="recurring-meta">Last done: '+new Date(task.last_done_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div>';
    h+='<span class="recurring-due '+dueClass+'">'+dueLabel+'</span>';
    h+='</div>';
    h+='<div class="recurring-actions"><button onclick="completeRecurringTask('+task.id+')" title="Mark done">✅</button><button onclick="deleteRecurringTask('+task.id+')" title="Remove">🗑</button></div>';
    h+='</div>';
  });
  h+='</div>';

  h+='</div>'+renderBottomNav();
  document.getElementById('app').innerHTML=h;
}

// ============ CALENDAR VIEW ============
function changeCalMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}render();}
function renderCalendar(){
  let h='<div class="header"><div class="header-top"><h1>📅 '+t('calendar')+'</h1><div class="header-actions">'+renderLangSelector()+
    '</div></div></div>';
  h+='<div class="container">';
  h+='<div class="month-selector"><button onclick="changeCalMonth(-1)">‹</button><h3>'+MONTH_NAMES[calMonth]+' '+calYear+'</h3><button onclick="changeCalMonth(1)">›</button></div>';

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date().toISOString().split('T')[0];

  // Build a map of reservations by date for this month
  const calRes={};
  RESERVATIONS.forEach(r=>{
    const d=r.co;if(!d)return;
    const[y,m]=d.split('-').map(Number);
    if(y===calYear&&m===calMonth+1){if(!calRes[d])calRes[d]=[];calRes[d].push(r);}
  });

  // Day headers
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  h+='<div class="cal-grid">';
  dayNames.forEach(d=>{h+='<div class="cal-header">'+d+'</div>';});

  // Empty cells before 1st
  for(let i=0;i<firstDay;i++) h+='<div class="cal-day empty"></div>';

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayRes=calRes[dateStr]||[];
    const dayDone=dayRes.filter(r=>done[keyFor(r)]).length;
    const isT=dateStr===today;

    h+='<div class="cal-day'+(isT?' today':'')+'" onclick="selectedDate=\''+dateStr+'\';setTab(\'planner\')">';
    h+='<div class="cal-num">'+d+'</div>';
    if(dayRes.length>0){
      h+='<div class="cal-count">'+dayRes.length+'</div>';
      if(dayDone>0)h+='<div class="cal-done-count">✓'+dayDone+'</div>';
      h+='<div class="cal-dots">';
      dayRes.slice(0,5).forEach(r=>{
        const cl=assignments[keyFor(r)]?getCleanerById(assignments[keyFor(r)]):null;
        h+='<div class="cal-dot" style="background:'+(cl?cl.color:'var(--text3)')+'"></div>';
      });
      if(dayRes.length>5)h+='<div style="font-size:8px;color:var(--text3)">+'+( dayRes.length-5)+'</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div></div>'+renderBottomNav();
  document.getElementById('app').innerHTML=h;
}

// ============ CLEANER STATS ============
function renderCleanerStats(){
  if(!cleanerMode)return;
  const cid=cleanerMode.id;
  const myRes=RESERVATIONS.filter(r=>assignments[keyFor(r)]===cid);
  const myDone=myRes.filter(r=>done[keyFor(r)]);
  const myTimers=myRes.filter(r=>timers[keyFor(r)]&&timers[keyFor(r)].duration_minutes).map(r=>timers[keyFor(r)].duration_minutes);
  const avgTime=myTimers.length>0?Math.round(myTimers.reduce((a,b)=>a+b,0)/myTimers.length):0;
  const fastestTime=myTimers.length>0?Math.min(...myTimers):0;
  const completionRate=myRes.length>0?Math.round(myDone.length/myRes.length*100):0;

  // Compute quality scores
  let totalScore=0,scoreCount=0;
  myDone.forEach(r=>{
    const key=keyFor(r);
    if(checklistCache[key]){const s=getQualityScore(key,r);totalScore+=s;scoreCount++;}
  });
  const avgScore=scoreCount>0?Math.round(totalScore/scoreCount):0;

  let h='<div class="header"><div class="header-top"><h1>'+icon('trending',18)+' '+t('myPerformance')+'</h1><div class="header-actions">'+renderLangSelector()+
    '<button class="icon-btn" onclick="cleanerLogout()" title="'+t('logout')+'" aria-label="Logout">'+icon('logout',18)+'</button>'+
    '</div></div></div>';
  h+='<div class="container">';

  // Big stat
  h+='<div class="stat-big"><div class="big-num">'+completionRate+'%</div><div class="big-label">'+t('progress')+'</div></div>';

  // Grid stats
  h+='<div class="stat-row-grid">';
  h+='<div class="stat-mini"><div class="mini-num">'+myRes.length+'</div><div class="mini-label">'+t('cleaningsTotal')+'</div></div>';
  h+='<div class="stat-mini"><div class="mini-num">'+myDone.length+'</div><div class="mini-label">'+t('done')+'</div></div>';
  h+='<div class="stat-mini"><div class="mini-num">'+(avgTime?avgTime+' '+t('mins'):'—')+'</div><div class="mini-label">'+t('avgTimeLabel')+'</div></div>';
  h+='<div class="stat-mini"><div class="mini-num">'+(fastestTime?fastestTime+' '+t('mins'):'—')+'</div><div class="mini-label">🏆 Best</div></div>';
  h+='</div>';

  // Quality score
  if(avgScore>0){
    h+='<div class="stat-big" style="padding:14px"><div class="big-num" style="font-size:36px;color:'+(avgScore>=80?'var(--green)':avgScore>=50?'var(--orange)':'var(--red)')+'">'+avgScore+'%</div><div class="big-label">'+t('qualityScore')+'</div></div>';
  }

  // Recent cleanings
  h+='<div class="settings-panel"><h3>'+t('recentActivity')+'</h3>';
  myRes.slice(0,10).forEach(r=>{
    const key=keyFor(r);
    const isDone=done[key];
    const timer=timers[key];
    h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">';
    h+='<div style="font-size:18px">'+(isDone?'✅':'⏳')+'</div>';
    h+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+esc(r.listing)+'</div>';
    h+='<div style="font-size:11px;color:var(--text2)">'+formatDate(r.co)+' · '+esc(r.guest)+'</div></div>';
    if(timer&&timer.duration_minutes) h+='<div style="font-size:12px;font-weight:700">'+timer.duration_minutes+' '+t('mins')+'</div>';
    h+='</div>';
  });
  h+='</div>';

  h+='</div>'+renderBottomNav();
  document.getElementById('app').innerHTML=h;
}

function getAllProperties(){
  const props=[];
  Object.entries(listingPrices).forEach(([lid,lp])=>{if(lp.listing_name)props.push({id:lid,name:lp.listing_name});});
  RESERVATIONS.forEach(r=>{if(r.listingId&&!props.find(p=>p.id==r.listingId))props.push({id:String(r.listingId),name:r.listing});});
  props.sort((a,b)=>a.name.localeCompare(b.name));
  return props;
}

async function bulkApplyAssign(kind, id){
  closeMtModal();
  const ids = Array.from(mtSelected);
  const updates = ids.map(tid => api('updateTicket',{body:{
    id: tid,
    assigned_technician_id: kind === 'tech' ? id : null,
    assigned_vendor_id: kind === 'vendor' ? id : null,
    status: 'assigned',
    actor: cleanerMode?cleanerMode.name:'Manager'
  }}));
  toast('Assigning '+ids.length+' tickets...');
  await Promise.all(updates);
  toast(ids.length+' tickets assigned ✓','success');
  haptic('medium');
  clearMtSelection();
  await refreshMaintenance();
}

        h+='<div class="mt-cmt-meta"><strong>'+esc(c.author||'Unknown')+'</strong> &middot; '+new Date(c.created_at).toLocaleString()+'</div>';
        h+='<div class="mt-cmt-text">'+esc(c.comment)+'</div>';
        h+='</div>';
      });
      h+='</div>';
    }
    h+='<div class="mt-cmt-add">';
    h+='<input type="text" id="mtCmtInput-'+t.id+'" placeholder="Add a comment…" onkeydown="if(event.key===\'Enter\'){event.stopPropagation();submitInlineComment('+t.id+')}" onclick="event.stopPropagation()" />';
    h+='<button class="btn-secondary" style="font-size:11px;padding:6px 12px" onclick="event.stopPropagation();submitInlineComment('+t.id+')">Send</button>';
    h+='</div>';
    h+='</div>';
    h+='</div>';
  }
  // Desktop hover quick actions
  if(!mtSelectMode){
    h+='<div class="card-quick-actions" onclick="event.stopPropagation()">';
    if(t.status !== 'resolved'){
      h+='<button class="qa-btn qa-primary" title="Assign" onclick="openAssignPicker('+t.id+')">'+icon('user',14)+'</button>';
    }
    if(['in_progress','waiting_parts'].includes(t.status)){
      h+='<button class="qa-btn qa-success" title="Resolve" onclick="resolveTicket('+t.id+')">'+icon('check',14)+'</button>';
    }
    h+='<button class="qa-btn" title="Comment" onclick="toggleMtExpand('+t.id+');setTimeout(function(){var i=document.getElementById(\'mtCmtInput-'+t.id+'\');if(i)i.focus();},80)">'+icon('msgSquare',14)+'</button>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

  h+='<input type="text" class="mt-search" placeholder="🔍 Search tickets…" value="'+esc(mtSearch)+'" oninput="mtSearch=this.value;render()" />';

  ['plumbing','electrical','ac','appliance','structural','pest','painting','general'].forEach(c=>{
    h+='<div class="mt-filter-chip'+(mtFilterCat===c?' active':'')+'" onclick="setMtFilter(\'cat\',\''+c+'\')">'+(CAT_ICONS[c]||'')+' '+c+'</div>';

  // === Filter logic ===

  if(mtSearch.trim()){const q=mtSearch.toLowerCase();toShow=toShow.filter(t=>(t.title||'').toLowerCase().includes(q)||(t.description||'').toLowerCase().includes(q));}

  if(mtViewMode==='board'){
    // === Kanban board ===
    const cols=[['open','Open','#3b82f6'],['assigned','Assigned','#8b5cf6'],['in_progress','In Progress','#f97316'],['waiting_parts','Waiting Parts','#ca8a04']];

      const colTickets=toShow.filter(t=>t.status===status);
      h+='<div class="mt-kb-col">';

        const sla=getSLAStatus(t);

        h+='<div class="mt-kb-card '+t.priority+'" onclick="toggleMtExpand('+t.id+')">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><strong style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</strong><span class="mt-pri-badge '+t.priority+'">'+t.priority+'</span></div>';
        h+='<div style="font-size:10px;color:var(--text2);margin-bottom:4px">🏠 '+(propName?esc(propName):'<em style="color:var(--text3)">No property</em>')+'</div>';
        if(t.sla_deadline)h+='<div style="margin-bottom:4px"><span class="mt-sla '+sla.cls+'" style="font-size:9px">'+sla.label+'</span></div>';
        const tech=t.assigned_technician_id?cleaners.find(c=>c.id===t.assigned_technician_id):null;
        if(tech)h+='<div style="font-size:10px;color:var(--text3)">👤 '+esc(tech.name)+'</div>';

            const kbAssignLabel = (t.assigned_technician_id || t.assigned_vendor_id) ? 'Reassign…' : 'Assign…';
            h+='<button class="btn-secondary" style="font-size:10px;padding:4px 8px" onclick="event.stopPropagation();openAssignPicker('+t.id+')">'+icon('user',10)+' '+kbAssignLabel+'</button>';
            if(['open','assigned'].includes(t.status))h+='<button onclick="updateTicketStatus('+t.id+',\'in_progress\')" style="background:var(--primary);color:white;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">Start</button>';
            if(['in_progress','waiting_parts'].includes(t.status))h+='<button onclick="resolveTicket('+t.id+')" style="background:var(--green);color:white;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">Resolve</button>';
          }else{
            if(t.status==='assigned')h+='<button onclick="updateTicketStatus('+t.id+',\'in_progress\')" style="background:var(--primary);color:white;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">Start</button>';
            if(t.status==='in_progress'||t.status==='waiting_parts')h+='<button onclick="resolveTicket('+t.id+')" style="background:var(--green);color:white;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">Resolve</button>';
          }
          h+='<button onclick="viewTicketComments('+t.id+')" style="background:var(--bg);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">💬</button>';
          h+='</div></div>';
        }
        h+='</div>';
      });
      h+='</div>';
    });
    h+='</div>';
  }else{
    // === List view ===
    // S3/S4: Desktop view toggle (Cards / Table / Kanban)
    h+=renderMtViewToggle();
    if(mtViewModeUI==='kanban' && isDesktop()){
      h+='<div class="settings-panel"><h3>Tickets <span style="font-weight:400;color:var(--text3);font-size:13px">('+toShow.length+')</span></h3>';
      h+=renderMtKanban(toShow);
      h+='</div>';
    } else if(mtViewModeUI==='table' && isDesktop()){
      h+='<div class="settings-panel"><h3>Tickets <span style="font-weight:400;color:var(--text3);font-size:13px">('+toShow.length+')</span></h3>';
      h+=renderMtTable(toShow);
      h+='</div>';
    } else {
      h+='<div class="settings-panel"><h3>Tickets <span style="font-weight:400;color:var(--text3);font-size:13px">('+toShow.length+')</span></h3>';
      if(toShow.length===0){
        const hasFilter = mtFilterStatus||mtFilterCat||mtSearch.trim();
        if(hasFilter){ h+='<div class="empty-hero" style="padding:30px 20px"><div class="empty-hero-icon">'+icon('search',56)+'</div><div class="empty-hero-title">No tickets</div><div class="empty-hero-sub">No ticket matches this filter.</div></div>'; }
        else { h+='<div class="empty-hero" style="padding:30px 20px"><div class="empty-hero-icon">'+icon('wrench',56)+'</div><div class="empty-hero-title">All clear — no open tickets</div><div class="empty-hero-sub">All properties are in good shape.</div></div>'; }
      }
      toShow.forEach(t=>{
        h+=renderMtTicketCard(t,allProps,isManager,mtExpandedTicket===t.id);
      });
      h+='</div>';
    }
  }
  if(mtSelectMode && mtSelected.size > 0){
    h += '<div class="mt-bulk-bar">';
    h += '<div class="mt-bulk-count">'+mtSelected.size+' selected</div>';
    h += '<button class="btn-secondary" onclick="bulkAssignSelected()" style="font-size:13px;padding:7px 14px">'+icon('user',14)+' Assign…</button>';
    h += '<button class="btn-secondary" onclick="bulkChangeStatus()" style="font-size:13px;padding:7px 14px">'+icon('refresh',14)+' Status…</button>';
    h += '<button class="btn-ghost" onclick="clearMtSelection()" style="font-size:13px;padding:7px 14px">Cancel</button>';
    h += '</div>';
  }
  // S2b: Desktop multi-pane — wrap list with right-side detail
  if(isDesktop() && currentTab === 'maintenance' && (typeof mtSubTab === 'undefined' || mtSubTab === 'tickets' || !mtSubTab)){
    let detailHtml = '';
    if(mtExpandedTicket){
      const _t = (maintenanceTickets||[]).concat(resolvedTickets||[]).find(x => x.id === mtExpandedTicket);
      if(_t) detailHtml = renderTicketDetailPane(_t, isManager);
    }
    if(!detailHtml){
      detailHtml = '<div class="detail-pane-empty">'+icon('clipboard',24)+'<div style="margin-top:10px">Select a ticket to see details</div></div>';
    }
    h = '<div class="mt-two-col"><div class="mt-list-side">' + h + '</div><aside class="mt-detail-side">' + detailHtml + '</aside></div>';
  }
  return h;
}

function generateReportText(type){
  const today=new Date().toLocaleDateString();
  let text='🔧 MAINTENANCE REPORT\n📅 '+today+'\n';
  text+='━━━━━━━━━━━━━━━━━━━\n\n';

  if(type==='full'||type==='open'){
    text+='⚠️ OPEN TICKETS ('+maintenanceTickets.length+')\n';
    text+='───────────────────\n';
    if(maintenanceTickets.length===0)text+='No open tickets ✓\n';
    maintenanceTickets.forEach(t=>{
      const prop=RESERVATIONS.find(r=>String(r.listingId)===String(t.listing_id));
      const sla=getSLAStatus(t);
      text+='• '+t.title+'\n';
      text+='  📍 '+(prop?prop.listing:'N/A')+'\n';
      text+='  🏷️ '+t.category+' | '+t.priority.toUpperCase()+'\n';
      text+='  ⏱️ '+sla.label+'\n';
      text+='  📊 Status: '+t.status+'\n\n';
    });
  }

  if(type==='full'||type==='resolved'){
    text+='✅ RESOLVED ('+resolvedTickets.length+')\n';
    text+='───────────────────\n';
    if(resolvedTickets.length===0)text+='No resolved tickets\n';
    resolvedTickets.slice(0,20).forEach(t=>{
      const prop=RESERVATIONS.find(r=>String(r.listingId)===String(t.listing_id));
      text+='• '+t.title;
      text+='\n';
      text+='  📍 '+(prop?prop.listing:'N/A')+'\n';
      text+='  ✅ '+new Date(t.resolved_at||t.created_at).toLocaleDateString()+'\n';
      if(t.resolution_notes)text+='  💬 '+t.resolution_notes+'\n';
      text+='\n';
    });
  }

  if(type==='full'&&recurringIssues.length>0){
    text+='🔄 RECURRING ISSUES\n';
    text+='───────────────────\n';
    recurringIssues.forEach(ri=>{
      const prop=RESERVATIONS.find(r=>String(r.listingId)===String(ri.listing_id));
      text+='• '+(CAT_ICONS[ri.category]||'')+' '+ri.category+' at '+(prop?prop.listing:'?')+': '+ri.count+'x in 90 days\n';
    });
    text+='\n';
  }

  text+='━━━━━━━━━━━━━━━━━━━\n';
  text+='Generated by HK Planner';
  return text;
}

function shareMaintenanceReport(type){
  const text=generateReportText(type);
  sendWhatsAppNoPhone(text);
}

  doc.setTextColor(0,0,0);
  mRes.sort((a,b)=>a.co.localeCompare(b.co)).forEach(r=>{
    if(y>275){doc.addPage();y=20;}
    const key=keyFor(r);
    const cl=mAssign[key]?getCleanerById(mAssign[key]):null;
    const timer=mTimers[key];
    doc.text(r.co,14,y);
    doc.text(r.guest.substring(0,30),45,y);
    doc.text(getRevenueFee(r)+' AED',110,y);
    doc.text(timer&&timer.duration_minutes?timer.duration_minutes+'min':'—',135,y);
    doc.text(cl?cl.name:'—',155,y);
    doc.text(mDone[key]?'Done':'Pending',185,y);
    y+=6;
  });

  // Issues section if any
  const propIssues=issues.filter(i=>i.listing_id==listingId);
  if(propIssues.length>0){
    if(y>240){doc.addPage();y=20;}
    y+=5;doc.setFontSize(14);doc.text('Issues Reported ('+propIssues.length+')',14,y);y+=8;
    doc.setFontSize(9);

      doc.text('• ['+i.severity.toUpperCase()+'] '+i.title.substring(0,60)+' — '+i.status,14,y);y+=5;
    });
  }

  doc.save('report_'+listingName.replace(/[^a-zA-Z0-9]/g,'_')+'_'+MONTH_NAMES[dashMonth]+'_'+dashYear+'.pdf');
  toast('Report generated ✓','success');
}

// CSV exports via backend (Feature 1)
async function exportCsv(type){
  const month = String(dashYear) + '-' + String(dashMonth + 1).padStart(2,'0'); // YYYY-MM en cours
  const actionMap = { cleanings:'exportCleaningsCsv', maintenance:'exportMaintenanceCsv' };
  const action = actionMap[type];
  if(!action) return;
  const url = API + '?action=' + action + '&month=' + month;
  const resp = await fetch(url, { headers: { 'X-App-Secret': APP_SHARED_SECRET } });
  if(!resp.ok){ toast('Export failed','error'); return; }
  const blob = await resp.blob();
  const a = document.createElement('a');
  const dlUrl = URL.createObjectURL(blob);
  a.href = dlUrl;
  a.download = `${type}_${month}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(dlUrl);
  toast('Export downloaded','success');
}

document.addEventListener('keydown', (e) => {
  // Desktop only
  if(window.innerWidth < 1024) return;
  // Ignore if typing
  const tag = (e.target && e.target.tagName ? e.target.tagName : '').toLowerCase();
  if(tag === 'input' || tag === 'textarea' || tag === 'select' || (e.target && e.target.isContentEditable)) return;
  // Ignore if any modal/overlay open
  if(document.querySelector('.modal-overlay, .cmdk-overlay, .more-overlay, .mt-modal-overlay')) return;
  // Ignore modifier keys (Cmd+K handled separately)
  if(e.metaKey || e.ctrlKey || e.altKey) return;

  const k = (e.key || '').toLowerCase();

  if(k === '?'){ e.preventDefault(); showShortcutsHelp(); return; }

  if(k === '/'){
    e.preventDefault();
    const inp = document.getElementById('headerSearchInput') || document.querySelector('.search-bar input');
    if(inp){ inp.focus(); }
    else if(typeof toggleSearch === 'function'){ toggleSearch(); }
    else if(typeof openCmdk === 'function'){ openCmdk(); }
    return;
  }

  if(k === 'j' || k === 'k'){
    e.preventDefault();
    const list = getKeyboardList();
    if(list.length === 0) return;
    if(keyboardSelectedIndex === null) keyboardSelectedIndex = 0;
    else keyboardSelectedIndex = (k === 'j') ? Math.min(list.length-1, keyboardSelectedIndex+1) : Math.max(0, keyboardSelectedIndex-1);
    highlightKeyboardItem(list[keyboardSelectedIndex]);
    return;
  }

  if(k === 'enter' && keyboardSelectedIndex !== null){
    const list = getKeyboardList();
    const item = list[keyboardSelectedIndex];
    if(item){
      e.preventDefault();
      const id = item.dataset.kbId;
      const type = item.dataset.kbType;
      if(type === 'cleaning' && id){
        if(typeof toggleExpand === 'function') toggleExpand(id, e);
      } else if(type === 'ticket' && id){
        if(typeof toggleMtExpand === 'function') toggleMtExpand(Number(id));
      }
    }
    return;
  }

  if(k === 'n'){
    e.preventDefault();
    if(currentTab === 'planner' && !cleanerMode){
      if(typeof openExtraModal === 'function') openExtraModal();
    } else if(currentTab === 'maintenance'){
      const ta = document.getElementById('mtDesc');
      if(ta) ta.focus();
    }
    return;
  }

  if(k === 'e' && keyboardSelectedIndex !== null){
    const list = getKeyboardList();
    const item = list[keyboardSelectedIndex];
    if(item && item.dataset.kbType === 'cleaning'){
      e.preventDefault();
      if(typeof markDone === 'function') markDone(item.dataset.kbId);
    }
    return;
  }

  if(k === 'a' && keyboardSelectedIndex !== null && currentTab === 'maintenance'){
    const list = getKeyboardList();
    const item = list[keyboardSelectedIndex];
    if(item && item.dataset.kbType === 'ticket'){
      e.preventDefault();
      if(typeof openAssignPicker === 'function') openAssignPicker(Number(item.dataset.kbId));
    }
    return;
  }

  if(k === 'c' && keyboardSelectedIndex !== null && currentTab === 'maintenance'){
    const list = getKeyboardList();
    const item = list[keyboardSelectedIndex];
    if(item && item.dataset.kbType === 'ticket'){
      e.preventDefault();
      const tid = Number(item.dataset.kbId);
      mtExpandedTicket = tid;
      if(typeof render === 'function') render();
      setTimeout(()=>{ const inp = document.getElementById('mtCmtInput-'+tid); if(inp) inp.focus(); }, 100);
    }
    return;
  }
});

// ======================= Global search (Cmd+K) =======================
let cmdkOpen=false, cmdkQuery='', cmdkIndex=0, cmdkResults=[];

function openCmdk(){
  cmdkOpen=true; cmdkQuery=''; cmdkIndex=0; cmdkResults=[];
  renderCmdk();
  setTimeout(()=>{const el=document.getElementById('cmdkInput');if(el)el.focus();},50);
}
function closeCmdk(){ cmdkOpen=false; renderCmdk(); }
function cmdkSearch(q){
  cmdkQuery=q; cmdkIndex=0;
  const query=q.toLowerCase().trim();
  if(!query){cmdkResults=[];renderCmdk();return;}
  const res=[];
  // Reservations
  (RESERVATIONS||[]).forEach(r=>{
    if((r.guest||'').toLowerCase().includes(query)||(r.listing||'').toLowerCase().includes(query)){
      res.push({group:'Reservations',icon:'🏠',title:r.guest||'Guest',meta:(r.listing||'')+' · '+(r.co||''),onClick:()=>{selectedDate=r.co;currentTab='planner';closeCmdk();render();}});
    }
  });
  // Cleaners
  (cleaners||[]).forEach(c=>{
    if((c.name||'').toLowerCase().includes(query)){
      res.push({group:'Cleaners',icon:'👤',title:c.name,meta:c.role||'cleaner',onClick:()=>{currentTab='settings';filterCleaner=c.id;closeCmdk();render();}});
    }
  });
  // Maintenance tickets
  (maintenanceTickets||[]).forEach(t=>{
    if((t.title||'').toLowerCase().includes(query)||(t.description||'').toLowerCase().includes(query)){
      res.push({group:'Maintenance',icon:'🔧',title:t.title||'Ticket',meta:'#'+t.id+' · '+(t.status||''),onClick:()=>{currentTab='maintenance';mtSubTab='tickets';closeCmdk();render();}});
    }
  });
  // Vendors
  (vendors||[]).forEach(v=>{
    if((v.name||'').toLowerCase().includes(query)){
      res.push({group:'Vendors',icon:'🏢',title:v.name,meta:v.specialty||'',onClick:()=>{currentTab='maintenance';mtSubTab='vendors';closeCmdk();render();}});
    }
  });
  // Equipment
  (equipment||[]).forEach(e=>{
    if((e.name||'').toLowerCase().includes(query)||(e.brand||'').toLowerCase().includes(query)){
      res.push({group:'Equipment',icon:'🛠️',title:e.name||'Equipment',meta:(e.brand||'')+(e.model?' '+e.model:''),onClick:()=>{currentTab='maintenance';mtSubTab='equipment';closeCmdk();render();}});
    }
  });
  // Properties
  Object.entries(listingPrices||{}).forEach(([id,l])=>{
    if((((l.listing_name||'')+' '+id)).toLowerCase().includes(query)){
      res.push({group:'Properties',icon:'🏘️',title:l.listing_name||id,meta:(l.bedrooms||0)+' BR · '+((l.custom_price||l.price)||0)+' AED',onClick:()=>{currentTab='properties';closeCmdk();render();}});
    }
  });
  cmdkResults=res.slice(0,30);
  renderCmdk();
}
function cmdkSelect(i){
  if(cmdkResults[i]&&cmdkResults[i].onClick){cmdkResults[i].onClick();}
}
function renderCmdk(){
  const el=document.getElementById('cmdk');
  if(!el)return;
  if(!cmdkOpen){el.style.display='none';el.innerHTML='';return;}
  el.style.display='block';
  const groups={};
  cmdkResults.forEach((r,i)=>{
    if(!groups[r.group]){groups[r.group]=[];}
    groups[r.group].push(Object.assign({},r,{_idx:i}));
  });
  let html='<div class="cmdk-overlay" onclick="if(event.target===this)closeCmdk()">';
  html+='<div class="cmdk-box" onclick="event.stopPropagation()">';
  html+='<input id="cmdkInput" class="cmdk-input" aria-label="Search" placeholder="Search for guest, cleaner, property, ticket..." value="'+esc(cmdkQuery)+'" oninput="cmdkSearch(this.value)" onkeydown="cmdkKeyDown(event)" />';
  html+='<div class="cmdk-results">';
  if(cmdkQuery && cmdkResults.length===0){
    html+='<div class="cmdk-empty">No results for "'+esc(cmdkQuery)+'"</div>';
  } else if(!cmdkQuery){
    html+='<div class="cmdk-empty">Type to search across the app<br>Reservations, cleaners, tickets, vendors, equipment, properties...</div>';
  } else {
    Object.entries(groups).forEach(([g,items])=>{
      html+='<div class="cmdk-group"><div class="cmdk-group-title">'+esc(g)+'</div>';
      items.forEach(r=>{
        html+='<div class="cmdk-item'+(r._idx===cmdkIndex?' active':'')+'" onclick="cmdkSelect('+r._idx+')">';
        html+='<span class="icon">'+r.icon+'</span><span class="title">'+esc(r.title)+'</span><span class="meta">'+esc(r.meta||'')+'</span>';
        html+='</div>';
      });
      html+='</div>';
    });
  }
  html+='</div>';
  html+='<div class="cmdk-hint"><span><kbd>↑</kbd><kbd>↓</kbd> navigate · <kbd>Enter</kbd> select</span><span><kbd>Esc</kbd> close</span></div>';
  html+='</div></div>';
  el.innerHTML=html;
}
function cmdkKeyDown(e){
  if(e.key==='Escape'){e.preventDefault();closeCmdk();return;}
  if(e.key==='ArrowDown'){e.preventDefault();cmdkIndex=Math.min(cmdkResults.length-1,cmdkIndex+1);renderCmdk();setTimeout(()=>{const el=document.getElementById('cmdkInput');if(el){el.focus();try{el.setSelectionRange(el.value.length,el.value.length);}catch(_){}}},10);return;}
  if(e.key==='ArrowUp'){e.preventDefault();cmdkIndex=Math.max(0,cmdkIndex-1);renderCmdk();setTimeout(()=>{const el=document.getElementById('cmdkInput');if(el){el.focus();try{el.setSelectionRange(el.value.length,el.value.length);}catch(_){}}},10);return;}
  if(e.key==='Enter'){e.preventDefault();cmdkSelect(cmdkIndex);return;}
}
document.addEventListener('keydown',(e)=>{
  if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();if(cmdkOpen)closeCmdk();else openCmdk();}
});

function syncExtraPriceDefaults(){
  const lid = extraModalState.form.listing_id;
  if(!lid) return;
  const l = listingPrices[lid];
  if(l){
    const val = l.custom_price || l.price;
    const el = document.getElementById('ef-cleanerprice');
    if(el && !extraModalState.form.cleaner_price) el.placeholder = 'Unit default: '+val+' AED';
  }
}

async function saveExtra(){
  const f = extraModalState.form;
  if(!f.listing_id || !f.cleaning_date){ toast('Unit and date required','error'); return; }
  if(!f.price_billed){ toast('Billed price required','error'); return; }
  const payload = {
    listing_id: f.listing_id,
    cleaning_date: f.cleaning_date,
    label: f.label || null,
    guest_name: f.guest_name || null,
    price_billed: f.price_billed ? Number(f.price_billed) : null,
    cleaner_price: f.cleaner_price ? Number(f.cleaner_price) : null,
    notes: f.notes || null,
    assigned_cleaner_id: f.assigned_cleaner_id ? Number(f.assigned_cleaner_id) : null,
    created_by: cleanerMode?cleanerMode.name:'Manager',
  };
  let r;
  if(extraModalState.editing){
    r = await api('updateExtraCleaning', {body: {id: f.id, ...payload}});
  } else {
    r = await api('addExtraCleaning', {body: payload});
  }
  if(r.status === 'success'){
    toast(extraModalState.editing?'Cleaning updated':'Extra cleaning added ✨','success');
    haptic('light');
    closeExtraModal();
    fetchAll();
  } else {
    toast(r.error || 'Error','error');
  }
}

async function deleteExtra(id){
  if(!confirm('Delete this extra cleaning?')) return;
  const r = await api('deleteExtraCleaning', {body: {id}});
  if(r.status === 'success'){
    toast('Deleted','success');
    closeExtraModal();
    fetchAll();
  } else {
    toast(r.error || 'Error','error');
  }
}

// ============ GLOBAL ESC HANDLER (close any active modal) ============
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  // Cmd+K modal first
  if (typeof cmdkOpen !== 'undefined' && cmdkOpen) { e.preventDefault(); closeCmdk(); return; }
  // Extra cleaning modal
  if (typeof extraModalState !== 'undefined' && extraModalState.open) { e.preventDefault(); closeExtraModal(); return; }
  // More menu
  if (typeof moreOpen !== 'undefined' && moreOpen) { e.preventDefault(); closeMoreMenu(); return; }
  // Any generic modal-overlay present in DOM
  const overlay = document.querySelector('.modal-overlay, .cmdk-overlay, .more-overlay');
  if (overlay) {
    const parent = overlay.parentElement;
    if (parent) parent.innerHTML = '';
    e.preventDefault();
  }
});
