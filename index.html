    if(dashKPIs.last7DaysCompletions&&dashKPIs.last7DaysCompletions.length>0){
      h+='<div style="margin-top:14px;padding:12px;background:rgba(0,0,0,0.02);border-radius:14px"><div style="font-size:12px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px">📈 '+t('trend7Days')+'</div>';
      h+='<div style="display:flex;align-items:end;gap:6px;height:60px">';
      const maxComp=Math.max(...dashKPIs.last7DaysCompletions.map(d=>d.completions),1);
      dashKPIs.last7DaysCompletions.forEach(d=>{
        const pct=Math.max(6,d.completions/maxComp*100);
        const dayLabel=new Date(d.date+'T00:00:00').toLocaleDateString('en',{weekday:'short'}).charAt(0);
        h+='<div style="flex:1;text-align:center"><div style="height:'+pct+'%;min-height:4px;background:var(--accent-gradient);border-radius:6px 6px 0 0;transition:height 0.5s cubic-bezier(0.4,0,0.2,1);box-shadow:0 -2px 8px rgba(233,69,96,0.2)" title="'+d.date+': '+d.completions+'"></div>';
        h+='<div style="font-size:9px;color:var(--text3);margin-top:4px;font-weight:700">'+dayLabel+'</div>';
        h+='<div style="font-size:10px;font-weight:800">'+d.completions+'</div></div>';
      });
      h+='</div></div>';
    }
    // Cleaner leaderboard
    if(dashKPIs.cleanerPerformance&&dashKPIs.cleanerPerformance.length>0){
      h+='<div style="margin-top:14px"><div style="font-size:12px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px">🏆 '+t('cleanerLeaderboard')+'</div>';
      const sorted=[...dashKPIs.cleanerPerformance].sort((a,b)=>b.totalCleanings-a.totalCleanings);
      sorted.forEach((cp,i)=>{
        const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
        const bgColor=i===0?'var(--primary-light)':i===1?'var(--orange-light)':i===2?'var(--green-light)':'transparent';
        h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;margin-bottom:4px;background:'+bgColor+';font-size:13px;transition:all 0.2s">';
        h+='<span style="width:24px;text-align:center;font-size:16px">'+(medal||('<span style="font-size:12px;font-weight:800;color:var(--text3)">'+(i+1)+'</span>'))+'</span>';
        h+='<span class="cleaner-dot" style="background:'+cp.color+';width:10px;height:10px"></span>';
        h+='<span style="flex:1;font-weight:700">'+esc(cp.name)+'</span>';
        h+='<span style="color:var(--text2);font-weight:600">'+cp.totalCleanings+' cleanings</span>';
        if(cp.avgTime)h+='<span style="color:var(--primary);font-weight:800;font-size:12px">~'+cp.avgTime+'min</span>';
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  }

  // #15 Export buttons
  h+='<div class="export-btns"><button class="export-btn" onclick="exportExcel()">📊 Export Excel</button><button class="export-btn" onclick="exportPDF()">📄 Export PDF</button>';
  if(!cleanerMode){
    // Invoice section — only past months
    const now=new Date();const curM=now.getMonth(),curY=now.getFullYear();
    let invOpts='';
    for(let i=0;i<12;i++){let m=curM-1-i,yr=curY;if(m<0){m+=12;yr--;}invOpts+='<option value="'+yr+'-'+m+'">'+MONTH_NAMES[m]+' '+yr+'</option>';}
    h+='<div style="display:flex;align-items:center;gap:6px;margin-top:4px"><select id="invoiceMonthSel" style="flex:1;padding:8px 10px;border:1px solid var(--primary);border-radius:10px;font-size:12px;font-weight:600;background:var(--primary-light);color:var(--primary);outline:none">'+invOpts+'</select>';
    h+='<button class="export-btn" onclick="generateInvoice()" style="background:var(--primary-light);border-color:var(--primary);color:var(--primary);white-space:nowrap">🧾 Invoice</button></div>';
  }
  h+='</div>';

  // Monthly Overview
  h+='<div class="dash-card"><h3>📈 '+MONTH_NAMES[dashMonth]+' Overview</h3><div class="dash-stat-row">'+
    '<div class="dash-stat"><div class="ds-num">'+total+'</div><div class="ds-label">Total</div></div>'+
    '<div class="dash-stat"><div class="ds-num">'+totalDone+'</div><div class="ds-label">Done</div></div>'+
    '<div class="dash-stat"><div class="ds-num">'+(total-totalDone)+'</div><div class="ds-label">Left</div></div>'+
    '<div class="dash-stat"><div class="ds-num">'+totalAssigned+'</div><div class="ds-label">Assigned</div></div></div></div>';

  // Revenue with visual gauge
  const revPct=revPotential>0?Math.round(revDone/revPotential*100):0;
  h+='<div class="dash-card"><h3>💰 Cleaning Fees</h3>';
  h+='<div style="display:flex;align-items:center;gap:16px;margin:10px 0">';
  // Revenue gauge circle
  h+='<div style="position:relative;width:80px;height:80px;flex-shrink:0">';
  h+='<svg viewBox="0 0 36 36" style="width:80px;height:80px;transform:rotate(-90deg)">';
  h+='<circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--border)" stroke-width="3"/>';
  h+='<circle cx="18" cy="18" r="15.9" fill="none" stroke="url(#revGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="'+revPct+' '+(100-revPct)+'" style="transition:stroke-dasharray 1s cubic-bezier(0.4,0,0.2,1)"/>';
  h+='<defs><linearGradient id="revGrad"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient></defs>';
  h+='</svg>';
  h+='<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font-size:16px;font-weight:900;color:var(--green)">'+revPct+'%</span></div></div>';
  // Revenue numbers
  h+='<div style="flex:1"><div style="font-size:22px;font-weight:900;color:var(--green)">'+revDone.toLocaleString()+' <span style="font-size:12px;font-weight:600">AED</span></div>';
  h+='<div style="font-size:11px;color:var(--text3)">of '+revPotential.toLocaleString()+' AED potential</div>';
  // Type breakdown mini
  const revByType={};mRes.forEach(r=>{const type=getUnitType(r.listingId);if(!revByType[type])revByType[type]={count:0,rev:0};revByType[type].count++;revByType[type].rev+=getRevenueFee(r);});
  h+='<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">';
  const typeColors={'Studio':'var(--primary)','1 BR':'var(--orange)','2 BR':'#6366f1','3 BR':'var(--green)'};
  Object.entries(revByType).sort((a,b)=>b[1].rev-a[1].rev).forEach(([type,d])=>{
    h+='<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:'+(typeColors[type]||'var(--border)')+'15;color:'+(typeColors[type]||'var(--text2)')+'">'+type+': '+d.count+'×'+getCleaningFee(mRes.find(r=>getUnitType(r.listingId)===type))+'</span>';
  });
  h+='</div></div></div></div>';

  // Revenue chart (#4)
  h+='<div class="dash-card"><h3>📉 Daily Revenue</h3><div class="chart-container"><canvas id="revenueChart"></canvas></div></div>';

  // By Property Type
  const byType={};
  mRes.forEach(r=>{const label=getUnitType(r.listingId);if(!byType[label])byType[label]=[];byType[label].push(r);});
  h+='<div class="dash-card"><h3>🏠 By Type</h3>';
  for(const[type,list]of Object.entries(byType).sort((a,b)=>a[0].localeCompare(b[0]))){
    const d=list.filter(r=>mDone[keyFor(r)]).length;
    const rev=list.reduce((s,r)=>s+getRevenueFee(r),0);
    const pct=list.length>0?Math.round(d/list.length*100):0;
    h+='<div class="cleaner-stat-row"><div class="cs-name">'+type+'</div><div class="cs-bar"><div class="cs-fill" style="width:'+pct+'%;background:var(--primary)"></div></div><div class="cs-count">'+d+'/'+list.length+' · '+rev.toLocaleString()+' AED</div></div>';
  }
  h+='</div>';

  // Owner Report per property (#18 - Manager only)
  h+='<div class="dash-card"><h3>📄 Property Reports</h3><div style="font-size:11px;color:var(--text3);margin-bottom:8px">Generate per-property cleaning report PDF</div>';
  const reportListings={};mRes.forEach(r=>{if(r.listingId&&!reportListings[r.listingId])reportListings[r.listingId]={name:r.listing,count:0};if(reportListings[r.listingId])reportListings[r.listingId].count++;});
  Object.entries(reportListings).sort((a,b)=>b[1].count-a[1].count).forEach(([lid,info])=>{
    h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><div style="font-size:12px;font-weight:600">'+esc(info.name)+' <span style="color:var(--text3);font-weight:400">('+info.count+')</span></div>'+
      '<button class="export-btn" onclick="generateOwnerReport(\''+lid+'\')">📄 PDF Report</button></div>';
  });
  h+='</div>';

  // Per cleaner with chart (#4)
  if(cleaners.length>0){
    h+='<div class="dash-card"><h3>👥 Per Cleaner</h3><div class="chart-container"><canvas id="cleanerChart"></canvas></div>';
    cleaners.forEach(c=>{
      const assigned=mRes.filter(r=>mAssign[keyFor(r)]===c.id).length;
      const cdone=mRes.filter(r=>mAssign[keyFor(r)]===c.id&&mDone[keyFor(r)]).length;
      const cRev=mRes.filter(r=>mAssign[keyFor(r)]===c.id).reduce((s,r)=>s+getRevenueFee(r),0);
      // Avg timer (#12)
      const cTimers=mRes.filter(r=>mAssign[keyFor(r)]===c.id&&mTimers[keyFor(r)]&&mTimers[keyFor(r)].duration_minutes).map(r=>mTimers[keyFor(r)].duration_minutes);
      const avgTime=cTimers.length>0?Math.round(cTimers.reduce((a,b)=>a+b,0)/cTimers.length):0;
      const pct=assigned>0?Math.round(cdone/assigned*100):0;
      h+='<div class="cleaner-stat-row"><div class="cs-name"><span class="cleaner-dot" style="background:'+c.color+'"></span>'+esc(c.name)+(avgTime?' <span style="font-size:10px;color:var(--text3)">~'+avgTime+'min</span>':'')+'</div>'+
        '<div class="cs-bar"><div class="cs-fill" style="width:'+pct+'%;background:'+c.color+'"></div></div>'+
        '<div class="cs-count">'+cdone+'/'+assigned+' · '+cRev.toLocaleString()+' AED</div></div>';
    });
    h+='</div>';
  }

  // Per day
  const mDates=[...new Set(mRes.map(r=>r.co))].sort();
  h+='<div class="dash-card"><h3>📅 Per Day</h3>';
  mDates.forEach(d=>{
    const dayRes=mRes.filter(r=>r.co===d),dc=dayRes.filter(r=>mDone[keyFor(r)]).length;
    const pct=dayRes.length>0?Math.round(dc/dayRes.length*100):0;
    const today=new Date().toISOString().split('T')[0];
    h+='<div class="cleaner-stat-row"><div class="cs-name">'+formatDate(d)+(d===today?' 🟢':'')+'</div>'+
      '<div class="cs-bar"><div class="cs-fill" style="width:'+pct+'%;background:var(--primary)"></div></div><div class="cs-count">'+dc+'/'+dayRes.length+'</div></div>';
  });
  h+='</div></div>'+renderBottomNav();
  document.getElementById('app').innerHTML=h;
  setTimeout(loadPropertyHeatmap,100);

  // Draw charts (#4)
  setTimeout(()=>{
    // Revenue per day chart
    const revCtx=document.getElementById('revenueChart');
    if(revCtx){
      const labels=mDates.map(d=>{const dt=new Date(d+'T00:00:00');return dt.getDate()+' '+MONTHS[dt.getMonth()];});
      const dataRev=mDates.map(d=>mRes.filter(r=>r.co===d).reduce((s,r)=>s+getRevenueFee(r),0));
      const dataDone=mDates.map(d=>mRes.filter(r=>r.co===d&&mDone[keyFor(r)]).reduce((s,r)=>s+getRevenueFee(r),0));
      new Chart(revCtx,{type:'bar',data:{labels,datasets:[
        {label:'Potential',data:dataRev,backgroundColor:'rgba(124,58,237,0.25)',borderColor:'#7c3aed',borderWidth:1},
        {label:'Earned',data:dataDone,backgroundColor:'rgba(5,150,105,0.5)',borderColor:'#059669',borderWidth:1}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10}}}},scales:{y:{beginAtZero:true,ticks:{font:{size:9}}},x:{ticks:{font:{size:8},maxRotation:45}}}}});
    }
    // Cleaner chart
    const clCtx=document.getElementById('cleanerChart');
    if(clCtx&&cleaners.length>0){
      const labels=cleaners.map(c=>c.name);
      const data=cleaners.map(c=>mRes.filter(r=>mAssign[keyFor(r)]===c.id).length);
      const colors=cleaners.map(c=>c.color);
      new Chart(clCtx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10}}}}}});
    }
  },100);
}

// ============ CALENDAR VIEW ============
function changeCalMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}render();}
function renderCalendar(){
  let h='<div class="header"><div class="header-top"><h1>📅 '+t('calendar')+'</h1><div class="header-actions">'+renderLangSelector()+
    '</div></div></div>';
  h+='<div class="container">';
  h+='<div class="month-selector"><button onclick="changeCalMonth(-1)">‹</button><h3>'+MONTH_NAMES[calMonth]+' '+calYear+'</h3><button onclick="changeCalMonth(1)">›</button></div>';

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date().toISOString().split('T')[0];

  // Build a map of reservations by date for this month
  const calRes={};
  RESERVATIONS.forEach(r=>{
    const d=r.co;if(!d)return;
    const[y,m]=d.split('-').map(Number);
    if(y===calYear&&m===calMonth+1){if(!calRes[d])calRes[d]=[];calRes[d].push(r);}
  });

  // Day headers
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  h+='<div class="cal-grid">';
  dayNames.forEach(d=>{h+='<div class="cal-header">'+d+'</div>';});

  // Empty cells before 1st
  for(let i=0;i<firstDay;i++) h+='<div class="cal-day empty"></div>';

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayRes=calRes[dateStr]||[];
    const dayDone=dayRes.filter(r=>done[keyFor(r)]).length;
    const isT=dateStr===today;

    h+='<div class="cal-day'+(isT?' today':'')+'" onclick="selectedDate=\''+dateStr+'\';setTab(\'planner\')">';
    h+='<div class="cal-num">'+d+'</div>';
    if(dayRes.length>0){
      h+='<div class="cal-count">'+dayRes.length+'</div>';
      if(dayDone>0)h+='<div class="cal-done-count">✓'+dayDone+'</div>';
      h+='<div class="cal-dots">';
      dayRes.slice(0,5).forEach(r=>{
        const cl=assignments[keyFor(r)]?getCleanerById(assignments[keyFor(r)]):null;
        h+='<div class="cal-dot" style="background:'+(cl?cl.color:'var(--text3)')+'"></div>';
      });
      if(dayRes.length>5)h+='<div style="font-size:8px;color:var(--text3)">+'+( dayRes.length-5)+'</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div></div>'+renderBottomNav();
  document.getElementById('app').innerHTML=h;
}

// ============ CLEANER STATS ============
function renderCleanerStats(){
  if(!cleanerMode)return;
  const cid=cleanerMode.id;
  const myRes=RESERVATIONS.filter(r=>assignments[keyFor(r)]===cid);
  const myDone=myRes.filter(r=>done[keyFor(r)]);
  const myTimers=myRes.filter(r=>timers[keyFor(r)]&&timers[keyFor(r)].duration_minutes).map(r=>timers[keyFor(r)].duration_minutes);
  const avgTime=myTimers.length>0?Math.round(myTimers.reduce((a,b)=>a+b,0)/myTimers.length):0;
  const fastestTime=myTimers.length>0?Math.min(...myTimers):0;
  const completionRate=myRes.length>0?Math.round(myDone.length/myRes.length*100):0;

  // Compute quality scores
  let totalScore=0,scoreCount=0;
  myDone.forEach(r=>{
    const key=keyFor(r);
    if(checklistCache[key]){const s=getQualityScore(key,r);totalScore+=s;scoreCount++;}
  });
  const avgScore=scoreCount>0?Math.round(totalScore/scoreCount):0;

  let h='<div class="header"><div class="header-top"><h1>📈 '+t('myPerformance')+'</h1><div class="header-actions">'+renderLangSelector()+
    '<button class="icon-btn" onclick="cleanerLogout()" title="'+t('logout')+'">🚪</button>'+
    '</div></div></div>';
  h+='<div class="container">';

  // Big stat
  h+='<div class="stat-big"><div class="big-num">'+completionRate+'%</div><div class="big-label">'+t('progress')+'</div></div>';

  // Grid stats
  h+='<div class="stat-row-grid">';
  h+='<div class="stat-mini"><div class="mini-num">'+myRes.length+'</div><div class="mini-label">'+t('cleaningsTotal')+'</div></div>';
  h+='<div class="stat-mini"><div class="mini-num">'+myDone.length+'</div><div class="mini-label">'+t('done')+'</div></div>';
  h+='<div class="stat-mini"><div class="mini-num">'+(avgTime?avgTime+' '+t('mins'):'—')+'</div><div class="mini-label">'+t('avgTimeLabel')+'</div></div>';
  h+='<div class="stat-mini"><div class="mini-num">'+(fastestTime?fastestTime+' '+t('mins'):'—')+'</div><div class="mini-label">🏆 Best</div></div>';
  h+='</div>';

  // Quality score
  if(avgScore>0){
    h+='<div class="stat-big" style="padding:14px"><div class="big-num" style="font-size:36px;color:'+(avgScore>=80?'var(--green)':avgScore>=50?'var(--orange)':'var(--red)')+'">'+avgScore+'%</div><div class="big-label">'+t('qualityScore')+'</div></div>';
  }

  // Recent cleanings
  h+='<div class="settings-panel"><h3>'+t('recentActivity')+'</h3>';
  myRes.slice(0,10).forEach(r=>{
    const key=keyFor(r);
    const isDone=done[key];
    const timer=timers[key];
    h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">';
    h+='<div style="font-size:18px">'+(isDone?'✅':'⏳')+'</div>';
    h+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+esc(r.listing)+'</div>';
    h+='<div style="font-size:11px;color:var(--text2)">'+formatDate(r.co)+' · '+esc(r.guest)+'</div></div>';
    if(timer&&timer.duration_minutes) h+='<div style="font-size:12px;font-weight:700">'+timer.duration_minutes+' '+t('mins')+'</div>';
    h+='</div>';
  });
  h+='</div>';

  h+='</div>'+renderBottomNav();
  document.getElementById('app').innerHTML=h;
}

function getAllProperties(){
  const props=[];
  Object.entries(listingPrices).forEach(([lid,lp])=>{if(lp.listing_name)props.push({id:lid,name:lp.listing_name});});
  RESERVATIONS.forEach(r=>{if(r.listingId&&!props.find(p=>p.id==r.listingId))props.push({id:String(r.listingId),name:r.listing});});
  props.sort((a,b)=>a.name.localeCompare(b.name));
  return props;
}
function setMtFilter(key,val){
  if(key==='status')mtFilterStatus=mtFilterStatus===val?'all_open':val;
  if(key==='cat')mtFilterCat=mtFilterCat===val?'':val;
  render();
}

function setMtViewMode(m){mtViewMode=m;render();}
function toggleMtExpand(id){mtExpandedTicket=mtExpandedTicket===id?null:id;render();}
function setMtStatFilter(val){mtFilterStatus=mtFilterStatus===val?'all_open':val;render();}

function renderMtTicketCard(t,allProps,isManager,expanded){
  const sla=getSLAStatus(t);
  const prop=allProps.find(p=>String(p.id)===String(t.listing_id));
  const isResolved=t.status==='resolved';
  const tech=t.assigned_technician_id?cleaners.find(c=>c.id===t.assigned_technician_id):null;
  let h='<div class="mt-card '+t.priority+(isResolved?' resolved-card':'')+'" onclick="toggleMtExpand('+t.id+')">';
  // Line 1: title + priority badge
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
  h+='<strong style="font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</strong>';
  h+='<span class="mt-pri-badge '+t.priority+'" style="flex-shrink:0;margin-left:8px">'+t.priority+'</span>';
  h+='</div>';
  // Line 2: property + category icon
  h+='<div style="display:flex;gap:8px;align-items:center;font-size:11px;margin-bottom:6px">';
  if(prop)h+='<span style="color:var(--text2)">🏠 '+esc(prop.name)+'</span>';
  h+='<span class="mt-cat">'+(CAT_ICONS[t.category]||'🔨')+' '+t.category+'</span>';
  h+='</div>';
  // Line 3: status badge + SLA countdown (big)
  h+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">';
  h+='<span class="mt-status '+t.status+'">'+t.status.replace(/_/g,' ').toUpperCase()+'</span>';
  if(t.sla_deadline)h+='<span class="mt-sla-big '+sla.cls+'">'+sla.label+'</span>';
  h+='</div>';
  // Line 4: assigned technician + date
  h+='<div style="display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--text3)">';
  h+='<span>'+(tech?'👤 '+esc(tech.name):'Unassigned')+'</span>';
  h+='<span>'+new Date(t.created_at).toLocaleDateString()+' · '+esc(t.reported_by||'')+'</span>';
  h+='</div>';

  // Expanded: timeline + actions
  if(expanded){
    h+='<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px" onclick="event.stopPropagation()">';
    if(t.description&&t.description!==t.title)h+='<div style="font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.4">'+esc(t.description)+'</div>';
    // Timeline
    h+='<div class="mt-timeline">';
    h+='<div class="mt-tl-item"><div class="mt-tl-dot" style="background:#3b82f6"></div><strong>Created</strong><div class="mt-tl-date">'+new Date(t.created_at).toLocaleString()+'</div></div>';
    if(t.started_at)h+='<div class="mt-tl-item"><div class="mt-tl-dot" style="background:#f97316"></div><strong>Work Started</strong><div class="mt-tl-date">'+new Date(t.started_at).toLocaleString()+'</div></div>';
    if(t.resolved_at)h+='<div class="mt-tl-item"><div class="mt-tl-dot" style="background:#059669"></div><strong>Resolved</strong><div class="mt-tl-date">'+new Date(t.resolved_at).toLocaleString()+'</div></div>';
    if(t.closed_at)h+='<div class="mt-tl-item"><div class="mt-tl-dot" style="background:#6b7280"></div><strong>Closed</strong><div class="mt-tl-date">'+new Date(t.closed_at).toLocaleString()+'</div></div>';
    h+='</div>';
    // Vendor info
    if(t.assigned_vendor_id){const v=vendors.find(x=>x.id===t.assigned_vendor_id);if(v)h+='<div style="font-size:11px;color:var(--text2);margin-bottom:8px">📞 Vendor: '+esc(v.name)+'</div>';}
    // Actions
    if(isManager){
      h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">';
      if(t.status==='open')h+='<button onclick="updateTicketStatus('+t.id+',\'assigned\')" style="background:var(--orange);color:white;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer">Assign</button>';
      if(['open','assigned'].includes(t.status))h+='<button onclick="updateTicketStatus('+t.id+',\'in_progress\')" style="background:var(--primary);color:white;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer">Start Work</button>';
      if(['assigned','in_progress'].includes(t.status))h+='<button onclick="updateTicketStatus('+t.id+',\'waiting_parts\')" style="background:#9c27b0;color:white;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer">Waiting Parts</button>';
      if(['in_progress','waiting_parts'].includes(t.status))h+='<button onclick="resolveTicket('+t.id+')" style="background:var(--green);color:white;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer">Resolve</button>';
      h+='<button onclick="viewTicketComments('+t.id+')" style="background:var(--bg);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer">💬</button>';
      h+='</div>';
    }else{
      h+='<div style="display:flex;gap:6px;margin-top:8px">';
      if(t.status==='assigned')h+='<button onclick="updateTicketStatus('+t.id+',\'in_progress\')" style="background:var(--primary);color:white;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer">Start Work</button>';
      if(t.status==='in_progress')h+='<button onclick="updateTicketStatus('+t.id+',\'waiting_parts\')" style="background:#9c27b0;color:white;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer">Need Parts</button>';
      if(t.status==='in_progress'||t.status==='waiting_parts')h+='<button onclick="resolveTicket('+t.id+')" style="background:var(--green);color:white;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer">Resolve</button>';
      h+='<button onclick="viewTicketComments('+t.id+')" style="background:var(--bg);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer">💬</button>';
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

  const inProgCount=allOpen.filter(t=>t.status==='in_progress').length;
  const waitCount=allOpen.filter(t=>t.status==='waiting_parts').length;
  const now7=Date.now()-7*86400000;
  const resolvedWeek=resolvedTickets.filter(t=>t.resolved_at&&new Date(t.resolved_at).getTime()>now7).length;
  h+='<div class="mt-stats">';

  h+='<div class="mt-stat-card'+(mtFilterStatus==='urgent_stat'?' active':'')+'" onclick="setMtStatFilter(\'urgent_stat\')" style="'+(urgentCount>0?'border-color:#dc2626':'')+'"><div class="mt-stat-num" style="'+(urgentCount>0?'color:#dc2626':'')+'">'+urgentCount+'</div><div class="mt-stat-label">Urgent</div></div>';
  h+='<div class="mt-stat-card'+(mtFilterStatus==='in_progress'?' active':'')+'" onclick="setMtStatFilter(\'in_progress\')"><div class="mt-stat-num" style="color:#f97316">'+inProgCount+'</div><div class="mt-stat-label">In Progress</div></div>';

  });

  // === View toggle ===
  h+='<div class="mt-view-toggle">';
  h+='<button class="mt-view-btn'+(mtViewMode==='list'?' active':'')+'" onclick="setMtViewMode(\'list\')">📋 List</button>';
  h+='<button class="mt-view-btn'+(mtViewMode==='board'?' active':'')+'" onclick="setMtViewMode(\'board\')">📊 Board</button>';

      h+='<div class="mt-kb-col">';
      h+='<div class="mt-kb-header"><span style="color:'+color+'">'+label+'</span><span class="mt-kb-count">'+colTickets.length+'</span></div>';
      if(colTickets.length===0){h+='<div style="font-size:11px;color:var(--text3);text-align:center;padding:20px 0">No tickets</div>';}
      colTickets.forEach(t=>{

        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><strong style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</strong><span class="mt-pri-badge '+t.priority+'">'+t.priority+'</span></div>';
        if(prop)h+='<div style="font-size:10px;color:var(--text2);margin-bottom:4px">🏠 '+esc(prop.name)+'</div>';
        if(t.sla_deadline)h+='<div style="margin-bottom:4px"><span class="mt-sla '+sla.cls+'" style="font-size:9px">'+sla.label+'</span></div>';
        const tech=t.assigned_technician_id?cleaners.find(c=>c.id===t.assigned_technician_id):null;
        if(tech)h+='<div style="font-size:10px;color:var(--text3)">👤 '+esc(tech.name)+'</div>';
        // Expanded inline
        if(mtExpandedTicket===t.id){
          h+='<div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px" onclick="event.stopPropagation()">';
          h+='<div class="mt-timeline" style="margin:4px 0 4px 6px;padding:6px 0 2px 14px">';
          h+='<div class="mt-tl-item"><div class="mt-tl-dot" style="background:#3b82f6"></div>Created<div class="mt-tl-date">'+new Date(t.created_at).toLocaleString()+'</div></div>';
          if(t.started_at)h+='<div class="mt-tl-item"><div class="mt-tl-dot" style="background:#f97316"></div>Started<div class="mt-tl-date">'+new Date(t.started_at).toLocaleString()+'</div></div>';
          h+='</div>';
          h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">';
          if(isManager){
            if(t.status==='open')h+='<button onclick="updateTicketStatus('+t.id+',\'assigned\')" style="background:var(--orange);color:white;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">Assign</button>';
            if(['open','assigned'].includes(t.status))h+='<button onclick="updateTicketStatus('+t.id+',\'in_progress\')" style="background:var(--primary);color:white;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">Start</button>';
            if(['in_progress','waiting_parts'].includes(t.status))h+='<button onclick="resolveTicket('+t.id+')" style="background:var(--green);color:white;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">Resolve</button>';
          }else{
            if(t.status==='assigned')h+='<button onclick="updateTicketStatus('+t.id+',\'in_progress\')" style="background:var(--primary);color:white;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">Start</button>';
            if(t.status==='in_progress'||t.status==='waiting_parts')h+='<button onclick="resolveTicket('+t.id+')" style="background:var(--green);color:white;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">Resolve</button>';
          }
          h+='<button onclick="viewTicketComments('+t.id+')" style="background:var(--bg);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer">💬</button>';
          h+='</div></div>';
        }
        h+='</div>';
      });
      h+='</div>';
    });
    h+='</div>';
  }else{
    // === List view ===
    h+='<div class="settings-panel"><h3>Tickets <span style="font-weight:400;color:var(--text3);font-size:13px">('+toShow.length+')</span></h3>';
    if(toShow.length===0){h+='<p style="color:var(--text2);font-size:12px;">No tickets match filters</p>';}
    toShow.forEach(t=>{
      h+=renderMtTicketCard(t,allProps,isManager,mtExpandedTicket===t.id);
    });
    h+='</div>';
  }
  return h;
}

function generateReportText(type){
  const today=new Date().toLocaleDateString();
  let text='🔧 MAINTENANCE REPORT\n📅 '+today+'\n';
  text+='━━━━━━━━━━━━━━━━━━━\n\n';

  if(type==='full'||type==='open'){
    text+='⚠️ OPEN TICKETS ('+maintenanceTickets.length+')\n';
    text+='───────────────────\n';
    if(maintenanceTickets.length===0)text+='No open tickets ✓\n';
    maintenanceTickets.forEach(t=>{
      const prop=RESERVATIONS.find(r=>String(r.listingId)===String(t.listing_id));
      const sla=getSLAStatus(t);
      text+='• '+t.title+'\n';
      text+='  📍 '+(prop?prop.listing:'N/A')+'\n';
      text+='  🏷️ '+t.category+' | '+t.priority.toUpperCase()+'\n';
      text+='  ⏱️ '+sla.label+'\n';
      text+='  📊 Status: '+t.status+'\n\n';
    });
  }

  if(type==='full'||type==='resolved'){
    text+='✅ RESOLVED ('+resolvedTickets.length+')\n';
    text+='───────────────────\n';
    if(resolvedTickets.length===0)text+='No resolved tickets\n';
    resolvedTickets.slice(0,20).forEach(t=>{
      const prop=RESERVATIONS.find(r=>String(r.listingId)===String(t.listing_id));
      text+='• '+t.title;
      text+='\n';
      text+='  📍 '+(prop?prop.listing:'N/A')+'\n';
      text+='  ✅ '+new Date(t.resolved_at||t.created_at).toLocaleDateString()+'\n';
      if(t.resolution_notes)text+='  💬 '+t.resolution_notes+'\n';
      text+='\n';
    });
  }

  if(type==='full'&&recurringIssues.length>0){
    text+='🔄 RECURRING ISSUES\n';
    text+='───────────────────\n';
    recurringIssues.forEach(ri=>{
      const prop=RESERVATIONS.find(r=>String(r.listingId)===String(ri.listing_id));
      text+='• '+(CAT_ICONS[ri.category]||'')+' '+ri.category+' at '+(prop?prop.listing:'?')+': '+ri.count+'x in 90 days\n';
    });
    text+='\n';
  }

  text+='━━━━━━━━━━━━━━━━━━━\n';
  text+='Generated by HK Planner';
  return text;
}

// ============ OWNER REPORT PDF (#18 - Manager only) ============
function generateOwnerReport(listingId){
  if(!dashData){toast('Load dashboard first','error');return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const mRes=dashData.reservations.filter(r=>r.listingId==listingId);
  const mDone=dashData.done,mAssign=dashData.assignments,mTimers=dashData.timers||{};
  if(mRes.length===0){toast('No data for this property','error');return;}

  const listingName=mRes[0].listing||'Property #'+listingId;
  const total=mRes.length,totalDone=mRes.filter(r=>mDone[keyFor(r)]).length;
  const revTotal=mRes.reduce((s,r)=>s+getRevenueFee(r),0);

  // Header
  doc.setFillColor(26,26,46);doc.rect(0,0,210,40,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(20);doc.text('Property Cleaning Report',14,20);
  doc.setFontSize(12);doc.text(listingName,14,30);
  doc.text(MONTH_NAMES[dashMonth]+' '+dashYear,170,20,{align:'right'});

  // Summary
  doc.setTextColor(0,0,0);let y=55;
  doc.setFontSize(14);doc.text('Summary',14,y);y+=10;
  doc.setFontSize(11);
  doc.text('Total Cleanings: '+total,14,y);y+=7;
  doc.text('Completed: '+totalDone+' ('+Math.round(totalDone/total*100)+'%)',14,y);y+=7;
  doc.text('Total Cleaning Fees: '+revTotal.toLocaleString()+' AED',14,y);y+=7;

  // Avg cleaning time
  const tList=mRes.filter(r=>mTimers[keyFor(r)]&&mTimers[keyFor(r)].duration_minutes).map(r=>mTimers[keyFor(r)].duration_minutes);
  const avgT=tList.length>0?Math.round(tList.reduce((a,b)=>a+b,0)/tList.length):0;
  if(avgT>0){doc.text('Average Cleaning Time: '+avgT+' minutes',14,y);y+=7;}
  y+=5;

  // Table header
  doc.setFontSize(14);doc.text('Cleaning Details',14,y);y+=8;
  doc.setFontSize(9);doc.setTextColor(100,100,100);
  doc.text('Date',14,y);doc.text('Guest',45,y);doc.text('Fee',110,y);doc.text('Time',135,y);doc.text('Cleaner',155,y);doc.text('Status',185,y);
  y+=3;doc.setDrawColor(200,200,200);doc.line(14,y,196,y);y+=5;

  doc.setTextColor(0,0,0);
  mRes.sort((a,b)=>a.co.localeCompare(b.co)).forEach(r=>{
    if(y>275){doc.addPage();y=20;}
    const key=keyFor(r);
    const cl=mAssign[key]?getCleanerById(mAssign[key]):null;
    const timer=mTimers[key];
    doc.text(r.co,14,y);
    doc.text(r.guest.substring(0,30),45,y);
    doc.text(getRevenueFee(r)+' AED',110,y);
    doc.text(timer&&timer.duration_minutes?timer.duration_minutes+'min':'—',135,y);
    doc.text(cl?cl.name:'—',155,y);
    doc.text(mDone[key]?'Done':'Pending',185,y);
    y+=6;
  });

  // Issues section if any
  const propIssues=issues.filter(i=>i.listing_id==listingId);
  if(propIssues.length>0){
    if(y>240){doc.addPage();y=20;}
    y+=5;doc.setFontSize(14);doc.text('Issues Reported ('+propIssues.length+')',14,y);y+=8;
    doc.setFontSize(9);
    propIssues.forEach(i=>{
      if(y>275){doc.addPage();y=20;}
      doc.text('• ['+i.severity.toUpperCase()+'] '+i.title.substring(0,60)+' — '+i.status,14,y);y+=5;
    });
  }

  doc.save('report_'+listingName.replace(/[^a-zA-Z0-9]/g,'_')+'_'+MONTH_NAMES[dashMonth]+'_'+dashYear+'.pdf');
  toast('Report generated ✓','success');
}

// CSV exports via backend (Feature 1)
async function exportCsv(type){
  const month = String(dashYear) + '-' + String(dashMonth + 1).padStart(2,'0'); // YYYY-MM en cours
  const actionMap = { cleanings:'exportCleaningsCsv', maintenance:'exportMaintenanceCsv', payroll:'exportPayrollCsv' };
  const action = actionMap[type];
  if(!action) return;
  const url = API + '?action=' + action + '&month=' + month;
  const resp = await fetch(url, { headers: { 'X-App-Secret': APP_SHARED_SECRET } });
  if(!resp.ok){ toast('Export failed','error'); return; }
  const blob = await resp.blob();
  const a = document.createElement('a');
  const dlUrl = URL.createObjectURL(blob);
  a.href = dlUrl;
  a.download = `${type}_${month}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(dlUrl);
  toast('Export téléchargé','success');
}

    doc.text(r.listing.substring(0,30),90,y);doc.text(getRevenueFee(r)+' AED',150,y);
    doc.text(mDone[keyFor(r)]?'Done':'Pending',170,y);y+=5;
  });

  toast('PDF exported ✓','success');
}

async function generateInvoice(){
  const sel=document.getElementById('invoiceMonthSel');
  if(!sel){toast('Select a month','error');return;}
  const[invYear,invMonth]=sel.value.split('-').map(Number);

  // Block if month not finished
  const now=new Date();
  const endOfMonth=new Date(invYear,invMonth+1,0,23,59,59);
  if(now<=endOfMonth){toast('Month not finished yet','error');return;}

  // Fetch data for selected month
  toast('Loading data…','info');
  const startDate=invYear+'-'+String(invMonth+1).padStart(2,'0')+'-01';
  const lastDay=new Date(invYear,invMonth+1,0).getDate();
  const endDate=invYear+'-'+String(invMonth+1).padStart(2,'0')+'-'+String(lastDay).padStart(2,'0');
  let invData;
  try{
    const resp=await fetch(API+'?action=checkouts&startDate='+startDate+'&endDate='+endDate);
    invData=await resp.json();
  }catch(e){toast('Failed to load data','error');return;}
  const allRes=invData.reservations||[];
  const allDone=invData.done||{};
  if(!allRes.length){toast('No reservations for this month','error');return;}

  // Only completed cleanings (exclude ownerStay from invoice)
  const valid=['new','modified','confirmed','reserved'];
  const mRes=allRes.filter(r=>valid.includes(r.status));
  const doneRes=mRes.filter(r=>allDone[keyFor(r)]).sort((a,b)=>a.co.localeCompare(b.co));
  if(!doneRes.length){toast('No completed cleanings to invoice','error');return;}

  const{jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const companyName='HILLAL MEDINI VACATION HOMES RENTAL LLC';
  const monthLabel=MONTH_NAMES[invMonth]+' '+invYear;
  const invoiceNum='INV-'+invYear+String(invMonth+1).padStart(2,'0')+'-001';
  const invoiceDate=new Date().toLocaleDateString('en-GB');
  const totalAmount=doneRes.reduce((s,r)=>s+getRevenueFee(r),0);

  // ---- Header ----
  doc.setFillColor(124,58,237);
  doc.rect(0,0,210,38,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(22);doc.setFont(undefined,'bold');
  doc.text('INVOICE',14,18);
  doc.setFontSize(9);doc.setFont(undefined,'normal');
  doc.text(companyName,14,26);
  doc.text(invoiceNum,196,14,{align:'right'});
  doc.text('Date: '+invoiceDate,196,20,{align:'right'});
  doc.text('Period: '+monthLabel,196,26,{align:'right'});

  // ---- Summary box ----
  doc.setTextColor(30,27,75);
  let y=50;
  doc.setFillColor(245,245,247);
  doc.roundedRect(14,y-6,182,22,3,3,'F');
  doc.setFontSize(11);doc.setFont(undefined,'bold');
  doc.text('Summary',18,y);
  doc.setFont(undefined,'normal');doc.setFontSize(10);
  doc.text('Completed cleanings: '+doneRes.length,18,y+7);
  doc.text('Total amount: '+totalAmount.toLocaleString()+' AED',18,y+13);
  doc.text('Period: 01 — '+(new Date(dashYear,dashMonth+1,0).getDate())+' '+monthLabel,110,y+7);

  // ---- Table header ----
  y=78;
  doc.setFillColor(124,58,237);doc.setTextColor(255,255,255);
  doc.rect(14,y-5,182,8,'F');
  doc.setFontSize(8);doc.setFont(undefined,'bold');
  doc.text('#',18,y);
  doc.text('Date',26,y);
  doc.text('Property',52,y);
  doc.text('Guest',118,y);
  doc.text('Type',156,y);
  doc.text('Fee (AED)',178,y,{align:'right'});
  y+=6;

  // ---- Table rows ----
  doc.setTextColor(30,27,75);doc.setFont(undefined,'normal');doc.setFontSize(7.5);
  let runningTotal=0;
  doneRes.forEach((r,i)=>{
    if(y>272){
      // Footer before page break
      doc.setFontSize(7);doc.setTextColor(150);
      doc.text(companyName+' — '+invoiceNum,105,290,{align:'center'});
      doc.addPage();y=20;
      // Re-draw table header on new page
      doc.setFillColor(124,58,237);doc.setTextColor(255,255,255);
      doc.rect(14,y-5,182,8,'F');
      doc.setFontSize(8);doc.setFont(undefined,'bold');
      doc.text('#',18,y);doc.text('Date',26,y);doc.text('Property',52,y);doc.text('Guest',118,y);doc.text('Type',156,y);doc.text('Fee (AED)',178,y,{align:'right'});
      y+=6;doc.setTextColor(30,27,75);doc.setFont(undefined,'normal');doc.setFontSize(7.5);
    }
    const fee=getRevenueFee(r);
    runningTotal+=fee;
    // Alternate row bg
    if(i%2===0){doc.setFillColor(249,250,251);doc.rect(14,y-4,182,6,'F');}
    doc.text(String(i+1),18,y);
    doc.text(r.co,26,y);
    doc.text((r.listing||'').substring(0,35),52,y);
    doc.text((r.guest||'').substring(0,20),118,y);
    doc.text(getUnitType(r.listingId),156,y);
    doc.text(fee.toLocaleString(),178,y,{align:'right'});
    y+=6;
  });

  // ---- Total bar ----
  y+=4;
  doc.setFillColor(124,58,237);doc.setTextColor(255,255,255);
  doc.rect(14,y-5,182,10,'F');
  doc.setFontSize(11);doc.setFont(undefined,'bold');
  doc.text('TOTAL',18,y+1);
  doc.text(totalAmount.toLocaleString()+' AED',178,y+1,{align:'right'});

  // ---- Footer ----
  doc.setFontSize(7);doc.setTextColor(150);
  doc.text(companyName+' — '+invoiceNum+' — Generated '+invoiceDate,105,290,{align:'center'});

  doc.save('invoice_'+MONTH_NAMES[invMonth]+'_'+invYear+'.pdf');
  toast('Invoice generated ✓','success');
}

// ======================= Global search (Cmd+K) =======================
let cmdkOpen=false, cmdkQuery='', cmdkIndex=0, cmdkResults=[];

function openCmdk(){
  cmdkOpen=true; cmdkQuery=''; cmdkIndex=0; cmdkResults=[];
  renderCmdk();
  setTimeout(()=>{const el=document.getElementById('cmdkInput');if(el)el.focus();},50);
}
function closeCmdk(){ cmdkOpen=false; renderCmdk(); }
function cmdkSearch(q){
  cmdkQuery=q; cmdkIndex=0;
  const query=q.toLowerCase().trim();
  if(!query){cmdkResults=[];renderCmdk();return;}
  const res=[];
  // Réservations
  (RESERVATIONS||[]).forEach(r=>{
    if((r.guest||'').toLowerCase().includes(query)||(r.listing||'').toLowerCase().includes(query)){
      res.push({group:'Réservations',icon:'🏠',title:r.guest||'Guest',meta:(r.listing||'')+' · '+(r.co||''),onClick:()=>{selectedDate=r.co;currentTab='planner';closeCmdk();render();}});
    }
  });
  // Cleaners
  (cleaners||[]).forEach(c=>{
    if((c.name||'').toLowerCase().includes(query)){
      res.push({group:'Cleaners',icon:'👤',title:c.name,meta:c.role||'cleaner',onClick:()=>{currentTab='settings';filterCleaner=c.id;closeCmdk();render();}});
    }
  });
  // Maintenance tickets
  (maintenanceTickets||[]).forEach(t=>{
    if((t.title||'').toLowerCase().includes(query)||(t.description||'').toLowerCase().includes(query)){
      res.push({group:'Maintenance',icon:'🔧',title:t.title||'Ticket',meta:'#'+t.id+' · '+(t.status||''),onClick:()=>{currentTab='maintenance';mtSubTab='tickets';closeCmdk();render();}});
    }
  });
  // Vendors
  (vendors||[]).forEach(v=>{
    if((v.name||'').toLowerCase().includes(query)){
      res.push({group:'Vendors',icon:'🏢',title:v.name,meta:v.specialty||'',onClick:()=>{currentTab='maintenance';mtSubTab='vendors';closeCmdk();render();}});
    }
  });
  // Equipment
  (equipment||[]).forEach(e=>{
    if((e.name||'').toLowerCase().includes(query)||(e.brand||'').toLowerCase().includes(query)){
      res.push({group:'Équipement',icon:'🛠️',title:e.name||'Equipment',meta:(e.brand||'')+(e.model?' '+e.model:''),onClick:()=>{currentTab='maintenance';mtSubTab='equipment';closeCmdk();render();}});
    }
  });
  // Propriétés
  Object.entries(listingPrices||{}).forEach(([id,l])=>{
    if((((l.listing_name||'')+' '+id)).toLowerCase().includes(query)){
      res.push({group:'Propriétés',icon:'🏘️',title:l.listing_name||id,meta:(l.bedrooms||0)+' BR · '+((l.custom_price||l.price)||0)+' AED',onClick:()=>{currentTab='properties';closeCmdk();render();}});
    }
  });
  cmdkResults=res.slice(0,30);
  renderCmdk();
}
function cmdkSelect(i){
  if(cmdkResults[i]&&cmdkResults[i].onClick){cmdkResults[i].onClick();}
}
function renderCmdk(){
  const el=document.getElementById('cmdk');
  if(!el)return;
  if(!cmdkOpen){el.style.display='none';el.innerHTML='';return;}
  el.style.display='block';
  const groups={};
  cmdkResults.forEach((r,i)=>{
    if(!groups[r.group]){groups[r.group]=[];}
    groups[r.group].push(Object.assign({},r,{_idx:i}));
  });
  let html='<div class="cmdk-overlay" onclick="if(event.target===this)closeCmdk()">';
  html+='<div class="cmdk-box" onclick="event.stopPropagation()">';
  html+='<input id="cmdkInput" class="cmdk-input" placeholder="Rechercher un guest, cleaner, propriété, ticket..." value="'+esc(cmdkQuery)+'" oninput="cmdkSearch(this.value)" onkeydown="cmdkKeyDown(event)" />';
  html+='<div class="cmdk-results">';
  if(cmdkQuery && cmdkResults.length===0){
    html+='<div class="cmdk-empty">Aucun résultat pour "'+esc(cmdkQuery)+'"</div>';
  } else if(!cmdkQuery){
    html+='<div class="cmdk-empty">Tape pour rechercher dans toute l\'app<br>Réservations, cleaners, tickets, vendors, équipement, propriétés...</div>';
  } else {
    Object.entries(groups).forEach(([g,items])=>{
      html+='<div class="cmdk-group"><div class="cmdk-group-title">'+esc(g)+'</div>';
      items.forEach(r=>{
        html+='<div class="cmdk-item'+(r._idx===cmdkIndex?' active':'')+'" onclick="cmdkSelect('+r._idx+')">';
        html+='<span class="icon">'+r.icon+'</span><span class="title">'+esc(r.title)+'</span><span class="meta">'+esc(r.meta||'')+'</span>';
        html+='</div>';
      });
      html+='</div>';
    });
  }
  html+='</div>';
  html+='<div class="cmdk-hint"><span><kbd>↑</kbd><kbd>↓</kbd> naviguer · <kbd>Enter</kbd> sélectionner</span><span><kbd>Esc</kbd> fermer</span></div>';
  html+='</div></div>';
  el.innerHTML=html;
}
function cmdkKeyDown(e){
  if(e.key==='Escape'){e.preventDefault();closeCmdk();return;}
  if(e.key==='ArrowDown'){e.preventDefault();cmdkIndex=Math.min(cmdkResults.length-1,cmdkIndex+1);renderCmdk();setTimeout(()=>{const el=document.getElementById('cmdkInput');if(el){el.focus();try{el.setSelectionRange(el.value.length,el.value.length);}catch(_){}}},10);return;}
  if(e.key==='ArrowUp'){e.preventDefault();cmdkIndex=Math.max(0,cmdkIndex-1);renderCmdk();setTimeout(()=>{const el=document.getElementById('cmdkInput');if(el){el.focus();try{el.setSelectionRange(el.value.length,el.value.length);}catch(_){}}},10);return;}
  if(e.key==='Enter'){e.preventDefault();cmdkSelect(cmdkIndex);return;}
}
document.addEventListener('keydown',(e)=>{
  if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();if(cmdkOpen)closeCmdk();else openCmdk();}
});

// ==================== EXTRA CLEANINGS MODAL ====================
function openExtraModal(editingExtra){
  extraModalState.open=true;
  extraModalState.editing=editingExtra||null;
  extraModalState.form = editingExtra ? {
    id: editingExtra.id,
    listing_id: editingExtra.listing_id,
    cleaning_date: editingExtra.cleaning_date,
    label: editingExtra.label||'',
    guest_name: editingExtra.guest_name||'',
    price_billed: editingExtra.price_billed||'',
    cleaner_price: editingExtra.cleaner_price||'',
    notes: editingExtra.notes||'',
    assigned_cleaner_id: (assignments||{})[editingExtra.reservation_key]||'',
  } : {
    listing_id: '',
    cleaning_date: new Date().toISOString().split('T')[0],
    label: '',
    guest_name: '',
    price_billed: '',
    cleaner_price: '',
    notes: '',
    assigned_cleaner_id: '',
  };
  renderExtraModal();
}
function closeExtraModal(){ extraModalState.open=false; renderExtraModal(); }

function renderExtraModal(){
  let el=document.getElementById('extraModal');
  if(!el){ el=document.createElement('div'); el.id='extraModal'; document.body.appendChild(el); }
  if(!extraModalState.open){ el.innerHTML=''; return; }
  const f=extraModalState.form;
  const isEdit = !!extraModalState.editing;
  const listings = Object.entries(listingPrices||{})
    .map(([id,l])=>({id, name:l.listing_name||id, price:l.custom_price||l.price}))
    .sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const cleanersList = (cleaners||[]).filter(c => c.is_active!==false && (c.role||'cleaner')==='cleaner');
  el.innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeExtraModal()">'+
    '<div class="modal-box">'+
      '<div class="modal-header">'+
        '<div class="modal-title">'+(isEdit?'✏️ Modifier':'➕ Ajouter')+' un ménage extra</div>'+
        '<button class="modal-close" onclick="closeExtraModal()">✕</button>'+
      '</div>'+
      '<div class="modal-body">'+
        '<div class="form-row"><label>Unité <span class="req">*</span></label>'+
          '<select id="ef-listing" onchange="extraModalState.form.listing_id=this.value;syncExtraPriceDefaults();">'+
            '<option value="">Sélectionner...</option>'+
            listings.map(l=>'<option value="'+esc(l.id)+'" '+(f.listing_id===l.id?'selected':'')+'>'+esc(l.name)+'</option>').join('')+
          '</select>'+
        '</div>'+
        '<div class="form-row"><label>Date <span class="req">*</span></label>'+
          '<input type="date" id="ef-date" value="'+esc(f.cleaning_date)+'" onchange="extraModalState.form.cleaning_date=this.value">'+
        '</div>'+
        '<div class="form-row"><label>Type</label>'+
          '<select id="ef-label" onchange="extraModalState.form.label=this.value">'+
            '<option value="" '+(!f.label?'selected':'')+'>— Choisir —</option>'+
            '<option value="Mid-stay" '+(f.label==='Mid-stay'?'selected':'')+'>Mid-stay</option>'+
            '<option value="Owner turnover" '+(f.label==='Owner turnover'?'selected':'')+'>Owner turnover</option>'+
            '<option value="Deep clean" '+(f.label==='Deep clean'?'selected':'')+'>Deep clean</option>'+
            '<option value="Post-construction" '+(f.label==='Post-construction'?'selected':'')+'>Post-construction</option>'+
            '<option value="Other" '+(f.label==='Other'?'selected':'')+'>Autre</option>'+
          '</select>'+
        '</div>'+
        '<div class="form-row"><label>Nom du guest / Client</label>'+
          '<input type="text" id="ef-guest" value="'+esc(f.guest_name)+'" oninput="extraModalState.form.guest_name=this.value" placeholder="Facultatif">'+
        '</div>'+
        '<div class="form-grid">'+
          '<div class="form-row"><label>Prix facturé (AED) <span class="req">*</span></label>'+
            '<input type="number" step="1" id="ef-price" value="'+esc(String(f.price_billed))+'" oninput="extraModalState.form.price_billed=this.value" placeholder="250">'+
          '</div>'+
          '<div class="form-row"><label>Prix cleaner (AED)</label>'+
            '<input type="number" step="1" id="ef-cleanerprice" value="'+esc(String(f.cleaner_price))+'" oninput="extraModalState.form.cleaner_price=this.value" placeholder="Défaut unité">'+
          '</div>'+
        '</div>'+
        '<div class="form-row"><label>Cleaner assigné</label>'+
          '<select id="ef-cleaner" onchange="extraModalState.form.assigned_cleaner_id=this.value">'+
            '<option value="">— Non assigné —</option>'+
            cleanersList.map(c=>'<option value="'+c.id+'" '+(String(f.assigned_cleaner_id)===String(c.id)?'selected':'')+'>'+esc(c.name)+'</option>').join('')+
          '</select>'+
        '</div>'+
        '<div class="form-row"><label>Notes</label>'+
          '<textarea id="ef-notes" rows="2" oninput="extraModalState.form.notes=this.value" placeholder="Infos facultatives">'+esc(f.notes)+'</textarea>'+
        '</div>'+
      '</div>'+
      '<div class="modal-footer">'+
        (isEdit?'<button class="btn-danger" onclick="deleteExtra('+f.id+')">🗑 Supprimer</button>':'')+
        '<button class="btn-secondary" onclick="closeExtraModal()">Annuler</button>'+
        '<button class="btn-primary" onclick="saveExtra()">'+(isEdit?'💾 Enregistrer':'➕ Créer')+'</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function syncExtraPriceDefaults(){
  const lid = extraModalState.form.listing_id;
  if(!lid) return;
  const l = listingPrices[lid];
  if(l){
    const val = l.custom_price || l.price;
    const el = document.getElementById('ef-cleanerprice');
    if(el && !extraModalState.form.cleaner_price) el.placeholder = 'Défaut unité: '+val+' AED';
  }
}

async function saveExtra(){
  const f = extraModalState.form;
  if(!f.listing_id || !f.cleaning_date){ toast('Unité et date obligatoires','error'); return; }
  if(!f.price_billed){ toast('Prix facturé obligatoire','error'); return; }
  const payload = {
    listing_id: f.listing_id,
    cleaning_date: f.cleaning_date,
    label: f.label || null,
    guest_name: f.guest_name || null,
    price_billed: f.price_billed ? Number(f.price_billed) : null,
    cleaner_price: f.cleaner_price ? Number(f.cleaner_price) : null,
    notes: f.notes || null,
    assigned_cleaner_id: f.assigned_cleaner_id ? Number(f.assigned_cleaner_id) : null,
    created_by: cleanerMode?cleanerMode.name:'Manager',
  };
  let r;
  if(extraModalState.editing){
    r = await api('updateExtraCleaning', {body: {id: f.id, ...payload}});
  } else {
    r = await api('addExtraCleaning', {body: payload});
  }
  if(r.status === 'success'){
    toast(extraModalState.editing?'Ménage modifié':'Ménage extra ajouté ✨','success');
    closeExtraModal();
    fetchAll();
  } else {
    toast(r.error || 'Erreur','error');
  }
}

async function deleteExtra(id){
  if(!confirm('Supprimer ce ménage extra ?')) return;
  const r = await api('deleteExtraCleaning', {body: {id}});
  if(r.status === 'success'){
    toast('Supprimé','success');
    closeExtraModal();
    fetchAll();
  } else {
    toast(r.error || 'Erreur','error');
  }
}
