<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f0f0f3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HK Planner">
<link rel="manifest" href="manifest.json">
<title>Housekeeping Planner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========== CLAUDE UI DESIGN SYSTEM ========== */

:root {
  /* === Surface — cream warm === */
  --bg: #FAF9F5;
  --bg-2: #F5F4ED;
  --bg-3: #EFEEE5;
  --card: #FFFFFF;
  --card-hover: #FAF9F5;
  --header-bg: #FAF9F5;

  /* === Borders === */
  --border: #E5E2D6;
  --border-strong: #C9C4B3;
  --divider: #EEEAE0;

  /* === Text === */
  --text: #0F0F0E;
  --text-2: #4A4945;
  --text-3: #8B8A85;
  --text-inverse: #FFFFFF;

  /* === Brand — coral terracotta === */
  --primary: #CC785C;
  --primary-hover: #B86545;
  --primary-light: rgba(204, 120, 92, 0.08);
  --primary-light-strong: rgba(204, 120, 92, 0.16);

  /* === Status — muted/warm === */
  --green: #5C8060;
  --green-light: rgba(92, 128, 96, 0.08);
  --orange: #C29033;
  --orange-light: rgba(194, 144, 51, 0.08);
  --amber: #C29033;
  --amber-light: rgba(194, 144, 51, 0.08);
  --red: #B85045;
  --red-light: rgba(184, 80, 69, 0.08);
  --blue: #5B7A8C;
  --blue-light: rgba(91, 122, 140, 0.08);

  /* === Typography === */
  --font-serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --fs-xs: 11px;
  --fs-sm: 12px;
  --fs-md: 14px;
  --fs-lg: 16px;
  --fs-xl: 18px;
  --fs-2xl: 22px;
  --fs-3xl: 28px;
  --fs-4xl: 36px;
  --fw-regular: 400;
  --fw-medium: 500;
  --fw-semibold: 600;
  --fw-bold: 700;
  --lh-tight: 1.2;
  --lh-base: 1.55;
  --lh-loose: 1.7;
  --ls-tight: -0.02em;
  --ls-normal: -0.005em;
  --ls-wide: 0.04em;

  /* === Spacing === */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px;
  --sp-6: 24px; --sp-8: 32px; --sp-10: 40px; --sp-12: 48px; --sp-16: 64px;

  /* === Radius — slightly more pill === */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-pill: 9999px;

  /* === Shadows — very soft, warm === */
  --shadow-xs: 0 1px 2px rgba(15, 15, 14, 0.03);
  --shadow-sm: 0 1px 3px rgba(15, 15, 14, 0.04), 0 1px 2px rgba(15, 15, 14, 0.03);
  --shadow-md: 0 4px 12px rgba(15, 15, 14, 0.05), 0 2px 4px rgba(15, 15, 14, 0.03);
  --shadow-lg: 0 12px 32px rgba(15, 15, 14, 0.07), 0 4px 8px rgba(15, 15, 14, 0.04);
  --shadow-xl: 0 24px 64px rgba(15, 15, 14, 0.09), 0 8px 16px rgba(15, 15, 14, 0.05);

  /* === Transitions — slightly slower for "souffle" === */
  --transition: 280ms cubic-bezier(0.32, 0.72, 0, 1);
  --transition-fast: 200ms cubic-bezier(0.32, 0.72, 0, 1);
  --transition-slow: 420ms cubic-bezier(0.32, 0.72, 0, 1);

  /* === Compat (anciens noms encore utilisés) === */
  --bg2: var(--bg-2);
  --bg3: var(--bg-3);
  --card2: var(--bg-2);
  --text2: var(--text-2);
  --text3: var(--text-3);
  --primary-dark: var(--primary-hover);
  --gray: var(--text-3);
  --card-shadow: var(--shadow-sm);
  --card-shadow-hover: var(--shadow-md);
  --glass: var(--card);
  --glass-border: var(--border);
  --nav-bg: var(--bg-2);
  --nav-border: var(--border);
  --accent-gradient: linear-gradient(135deg, var(--primary) 0%, #D97757 100%);
  --success-gradient: linear-gradient(135deg, var(--green) 0%, #6FA075 100%);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans);
  background:var(--bg);
  color:var(--text);
  font-size: var(--fs-md);
  line-height: var(--lh-base);
  letter-spacing: var(--ls-normal);
  min-height:100vh;
  padding-bottom:80px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
}

/* ===== Headings — serif === */
h1, h2, h3, .header h1, .page-title, .stat-num, .ds-num, .empty-hero-title, .modal-title, .section-title, .acc-title, .onb-title {
  font-family: var(--font-serif);
  font-weight: var(--fw-medium);
  letter-spacing: var(--ls-tight);
  line-height: var(--lh-tight);
}
.header h1 { font-size: var(--fs-2xl); }
.modal-title { font-size: var(--fs-xl); }
.empty-hero-title { font-size: var(--fs-2xl); }
.stat-num, .ds-num { font-size: var(--fs-3xl); }
.onb-title { font-size: var(--fs-2xl); }

/* ===== DS Claude — pill buttons ===== */
button { font-family:inherit; cursor:pointer; transition:var(--transition); }
.btn-primary {
  background: var(--text);
  color: var(--text-inverse);
  border: 1px solid var(--text);
  padding: 9px 18px;
  border-radius: var(--radius-pill);
  font-size: var(--fs-md);
  font-weight: var(--fw-medium);
  letter-spacing: var(--ls-normal);
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  cursor: pointer;
  transition: var(--transition-fast);
}
.btn-primary:hover { background: var(--primary); border-color: var(--primary); }
.btn-primary:active { transform: translateY(1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 9px 18px;
  border-radius: var(--radius-pill);
  font-size: var(--fs-md);
  font-weight: var(--fw-medium);
  cursor: pointer;
  transition: var(--transition-fast);
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
}
.btn-secondary:hover { background: var(--bg-2); border-color: var(--border-strong); }
.btn-secondary:active { transform: translateY(1px); }

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border: none;
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  font-size: var(--fs-md);
  font-weight: var(--fw-medium);
  cursor: pointer;
  transition: var(--transition-fast);
}
.btn-ghost:hover { background: var(--bg-3); color: var(--text); }

.btn-danger {
  background: transparent;
  color: var(--red);
  border: 1px solid var(--red);
  padding: 9px 18px;
  border-radius: var(--radius-pill);
  font-size: var(--fs-md);
  font-weight: var(--fw-medium);
  cursor: pointer;
  transition: var(--transition-fast);
}
.btn-danger:hover { background: var(--red); color: var(--text-inverse); }

.btn-success {
  background: var(--green);
  color: var(--text-inverse);
  border: 1px solid var(--green);
  padding: 9px 18px;
  border-radius: var(--radius-pill);
  font-size: var(--fs-md);
  font-weight: var(--fw-medium);
  cursor: pointer;
  transition: var(--transition-fast);
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
}
.btn-success:hover { background: #4D7050; border-color: #4D7050; }

/* Card base */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:var(--sp-4);
  transition:var(--transition);
}
.card:hover { box-shadow:var(--shadow-sm); }

/* Inputs (global) — Claude UI */
input[type="text"], input[type="number"], input[type="tel"], input[type="email"], input[type="date"], input[type="search"], input[type="time"], input[type="password"], textarea, select {
  font-family: var(--font-sans);
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  font-size: var(--fs-md);
  outline: none;
  transition: var(--transition-fast);
  width: 100%;
  line-height:var(--lh-base);
}
input:focus, textarea:focus, select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
input::placeholder, textarea::placeholder { color: var(--text-3); }

/* ===== Claude UI — Stat / Generic cards ===== */
.dash-stat-row .dash-stat, .stat-card, .mt-stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--sp-4) var(--sp-5);
  transition: var(--transition-fast);
}
.dash-stat-row .dash-stat:hover, .mt-stat-card:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-xs);
}
.ds-num, .stat-num, .mt-stat-num {
  font-family: var(--font-serif);
  font-size: var(--fs-3xl);
  font-weight: var(--fw-medium);
  letter-spacing: var(--ls-tight);
  line-height: 1;
}
.ds-label, .stat-label, .mt-stat-label {
  font-size: var(--fs-sm);
  color: var(--text-2);
  margin-top: 6px;
  font-weight: var(--fw-medium);
}

.checkout-card, .mt-card, .dash-card, .settings-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--sp-4) var(--sp-5);
  transition: var(--transition-fast);
}
.checkout-card:hover, .mt-card:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-sm);
}

/* Badges */
.badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px;
  border-radius:var(--radius-sm);
  font-size:var(--fs-xs);
  font-weight:var(--fw-semibold);
  letter-spacing:var(--ls-wide);
  text-transform:uppercase;
}
.badge-primary { background:var(--primary-light); color:var(--primary); }
.badge-green   { background:var(--green-light);   color:var(--green); }
.badge-orange  { background:var(--orange-light);  color:var(--orange); }
.badge-red     { background:var(--red-light);     color:var(--red); }
.badge-blue    { background:var(--blue-light);    color:var(--blue); }
.badge-amber   { background:var(--amber-light);   color:var(--amber); }
.badge-neutral { background:var(--bg-3);          color:var(--text-2); }

/* Modal base */
.modal-overlay, .cmdk-overlay, .more-overlay, .mt-modal-overlay, .onb-overlay {
  background: rgba(15, 15, 14, 0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.modal-box, .cmdk-box, .more-sheet, .mt-modal, .onb-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-xl);
  overflow:hidden;
}
.modal-header {
  padding:var(--sp-4) var(--sp-5);
  border-bottom:1px solid var(--border);
}
.modal-body { padding:var(--sp-5); }
.modal-footer {
  padding:var(--sp-4) var(--sp-5);
  border-top:1px solid var(--border);
  background:var(--bg-2);
}

/* Tables */
table { width:100%; border-collapse:collapse; font-size:var(--fs-sm); }
table th { text-align:left; padding:var(--sp-2) var(--sp-3); font-weight:var(--fw-semibold); color:var(--text-3); font-size:var(--fs-xs); text-transform:uppercase; letter-spacing:var(--ls-wide); border-bottom:1px solid var(--border); }
table td { padding:var(--sp-3); border-bottom:1px solid var(--divider); color:var(--text); }

/* ===== A11Y: SKIP LINK + FOCUS VISIBLE ===== */
.skip-link { position:absolute; top:-40px; left:8px; background:var(--primary); color:white; padding:8px 16px; border-radius:var(--radius-sm); z-index:10001; text-decoration:none; font-weight:600; font-size:13px; }
.skip-link:focus { top:8px; }
:focus-visible { outline:2px solid var(--primary); outline-offset:2px; border-radius:var(--radius-sm); }
button:focus-visible, .icon-btn:focus-visible, [role="button"]:focus-visible { outline:2px solid var(--primary); outline-offset:2px; }
:focus:not(:focus-visible) { outline:none; }

/* ===== DESKTOP SIDEBAR WIDGETS (planner) ===== */
.sidebar-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--sp-4); margin-bottom:var(--sp-3); }
.sidebar-card h4 { font-size:var(--fs-xs); font-weight:var(--fw-semibold); color:var(--text-3); text-transform:uppercase; letter-spacing:var(--ls-wide); margin-bottom:var(--sp-2); }
.sidebar-stat { display:flex; justify-content:space-between; padding:var(--sp-1) 0; font-size:var(--fs-sm); }
.sidebar-stat strong { color:var(--text); font-weight:var(--fw-semibold); }
.sidebar-stat strong.success { color:var(--green); }
.sidebar-item { padding:var(--sp-2) 0; border-bottom:1px solid var(--divider); }
.sidebar-item:last-child { border-bottom:none; }
.sidebar-item-name { font-size:var(--fs-sm); font-weight:var(--fw-semibold); }
.sidebar-item-sub { font-size:var(--fs-xs); color:var(--text-2); margin-top:2px; }
.sidebar-empty { color:var(--text-3); font-size:var(--fs-sm); text-align:center; padding:var(--sp-4); }

@media (max-width: 1023px) {
  .planner-sidebar { display:none; }
  .planner-two-col { display:block; }
}

/* ===== DESKTOP RESPONSIVE ===== */
@media (min-width: 1024px) {
  body { padding-bottom:0; padding-left:220px; }

  /* Sidebar navigation — Claude vibe */
  .bottom-nav {
    top:0; left:0; right:auto; bottom:0;
    flex-direction:column;
    width:220px;
    background: var(--bg-2);
    border-top:none;
    border-right: 1px solid var(--border);
    box-shadow:none;
    padding: var(--sp-6) var(--sp-3) var(--sp-4);
    gap:2px;
    justify-content:flex-start;
    max-width:none;
    transform:none;
  }
  .bottom-nav::before {
    content:'HK Planner';
    display:block;
    font-family: var(--font-serif);
    font-size: var(--fs-xl);
    font-weight: var(--fw-semibold);
    color: var(--text);
    letter-spacing: var(--ls-tight);
    padding: var(--sp-1) var(--sp-3) var(--sp-6);
  }
  .nav-item {
    flex:0 0 auto;
    flex-direction:row;
    justify-content:flex-start;
    color: var(--text-2);
    padding: 9px var(--sp-3);
    gap:var(--sp-3);
    font-size:var(--fs-md);
    border-radius: var(--radius-md);
  }
  .nav-item:hover { background: var(--bg-3); color: var(--text); }
  .nav-item .nav-icon { font-size:18px; }
  .nav-item.active {
    background: var(--card);
    color: var(--text);
    box-shadow: var(--shadow-xs);
  }
  .nav-item.active .nav-icon, .nav-item.active svg { color: var(--primary); }
}

/* Bottom-nav mobile clean */
@media (max-width: 1023px) {
  .bottom-nav {
    background: var(--card);
    border-top: 1px solid var(--border);
    box-shadow: 0 -1px 3px rgba(15, 15, 14, 0.04);
  }
  .nav-item.active { color: var(--primary); }
  .nav-item.active .nav-icon, .nav-item.active svg { color: var(--primary); }
}

@media (min-width: 1024px) {

  .container { max-width:1100px; padding:24px; }

  /* Planner 2-column layout */
  .planner-two-col {
    display:grid;
    grid-template-columns:minmax(0, 1fr) 360px;
    gap:24px;
    align-items:flex-start;
  }
  .planner-sidebar { position:sticky; top:84px; }

  /* Dashboard grid */
  .dash-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:16px; }
  .dash-grid > .dash-card { margin-bottom:0; }

  /* Settings 2-col */
  .settings-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:16px; }

  /* Modal wider on desktop */
  .modal-box { max-width:620px; }
  .cmdk-box { max-width:720px; }
  .more-sheet { max-width:560px; border-radius:var(--radius-lg); margin:auto; }
  .more-overlay { align-items:center; }

  /* Header padding to account for sidebar */
  .header { padding-left:24px; padding-right:24px; }

  /* Form grid 2 cols in modals */
  .form-grid { grid-template-columns:1fr 1fr; }
}

@media (min-width: 1440px) {
  .container { max-width:1280px; }
  .planner-two-col { grid-template-columns:minmax(0, 1fr) 400px; }
}

/* ===== DESKTOP S2b: Multi-pane (List + Detail) ===== */
@media (min-width: 1024px) {
  /* Planner detail pane */
  .planner-two-col {
    grid-template-columns: minmax(0, 1fr) 380px;
    gap: 24px;
    align-items: flex-start;
  }
  /* Constrain main column so wide tables don't bleed into sidebar */
  .planner-main { min-width: 0; }
  /* Force table to respect parent width — prevents column expansion overlap */
  .planner-main .compact-table { table-layout: fixed; }
  .planner-main .compact-table th,
  .planner-main .compact-table td {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* In table view, hide sidebar widget for more room — set via body class */
  body.planner-table-mode .planner-two-col { grid-template-columns: minmax(0, 1fr); }
  body.planner-table-mode .planner-sidebar { display: none; }
  .planner-sidebar {
    position: sticky;
    top: 84px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
  }
  .detail-pane {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .detail-pane-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-3);
    font-size: var(--fs-sm);
    font-family: var(--font-serif);
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
  }
  .detail-pane-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-2);
  }
  .detail-pane-title {
    font-family: var(--font-serif);
    font-size: var(--fs-lg);
    font-weight: var(--fw-semibold);
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .detail-pane-close {
    background: transparent;
    border: none;
    color: var(--text-2);
    width: 28px;
    height: 28px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition-fast);
  }
  .detail-pane-close:hover { background: var(--bg-3); color: var(--text); }
  .detail-pane-body {
    padding: 16px 18px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
  }

  /* Selected state on cards (desktop only) */
  .checkout-card.detail-selected,
  .mt-card.detail-selected {
    border-color: var(--primary);
    background: var(--primary-light);
    box-shadow: var(--shadow-sm);
  }

  /* Maintenance two-col */
  .mt-two-col {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 420px;
    gap: 24px;
    align-items: flex-start;
  }
  .mt-detail-side {
    position: sticky;
    top: 84px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
  }
}

/* Background decorations hidden — clean neutral bg */
.bg-orbs,.bg-noise,.orb-3,.orb-4,.orb-5 { display:none; }

/* ===== HEADER — Claude UI ===== */
.header {
  background: var(--header-bg);
  color: var(--text);
  border-bottom: 1px solid var(--border);
  padding: var(--sp-5) var(--sp-4) var(--sp-4);
  position:sticky; top:0; z-index:100;
}
.header::after { display:none; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--sp-2); }
.header h1 {
  font-family: var(--font-serif);
  font-size: var(--fs-2xl);
  font-weight: var(--fw-medium);
  letter-spacing: var(--ls-tight);
  color: var(--text);
  display:flex; align-items:center; gap:var(--sp-2);
}
.header .subtitle, .subtitle {
  color: var(--text-3);
  font-size: var(--fs-xs);
  margin-top: 4px;
  font-weight: var(--fw-medium);
  margin-bottom:var(--sp-3);
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.header-actions { display:flex; gap:var(--sp-2); align-items:center; }
.icon-btn {
  background: var(--card);
  color: var(--text-2);
  border: 1px solid var(--border);
  width: 36px; height: 36px;
  border-radius: var(--radius-pill);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition-fast);
  cursor: pointer;
  font-size:15px;
}
.icon-btn:hover { background: var(--bg-2); color: var(--text); border-color: var(--border-strong); }
.icon-btn:active { transform: scale(0.96); }
/* Progress bar inside header */
.header-progress-bar { height:4px; background:var(--bg); border-radius:2px; overflow:hidden; margin-bottom:8px; }
.header-progress-fill { height:100%; background:var(--success-gradient); border-radius:2px; transition:width 0.5s ease; }
.header-progress-label { font-size:11px; font-weight:600; color:var(--text2); margin-bottom:6px; display:flex; justify-content:space-between; }

/* ===== HEADER SEARCH — Collapsible ===== */
.header-search { display:flex; align-items:center; gap:6px; margin-top:8px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:4px 8px; animation:slideDown 0.15s ease; }
.header-search input { flex:1; background:none; border:none; color:var(--text); font-size:14px; font-weight:500; padding:6px 8px; outline:none; font-family:inherit; }
.header-search input::placeholder { color:var(--text3); }
@keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

/* ===== HEADER INLINE STATS ===== */
.header-stats { display:flex; align-items:center; gap:4px; font-size:12px; font-weight:700; opacity:0.85; white-space:nowrap; }
.hs-item { display:flex; align-items:baseline; gap:2px; }
.hs-item small { font-size:9px; font-weight:500; opacity:0.6; text-transform:uppercase; letter-spacing:0.3px; }
.hs-done { color:#34d399; }
.hs-divider { opacity:0.3; font-size:10px; margin:0 1px; }

/* ===== DATE NAV ROW — Arrows + Pills ===== */
.date-nav-row { display:flex; align-items:center; gap:4px; margin-bottom:6px; }
.week-arrow { background:var(--bg-2); border:1px solid var(--border); color:var(--text-2); border-radius:var(--radius-sm); padding:4px 10px; cursor:pointer; font-size:15px; transition:var(--transition); font-weight:var(--fw-semibold); flex-shrink:0; }
.week-arrow:hover { background:var(--bg-3); color:var(--text); }
.week-arrow:active { transform:scale(0.98); }

/* ===== DATE NAV — Pill selectors ===== */
.date-nav { display:flex; gap:5px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; flex:1; }
.date-nav::-webkit-scrollbar { display:none; }

/* ===== HEADER PROGRESS — Mini bar ===== */
.header-progress { width:48px; height:28px; background:rgba(124,58,237,0.08); border-radius:var(--radius-sm); position:relative; overflow:hidden; flex-shrink:0; border:1px solid rgba(124,58,237,0.15); }
.hp-fill { position:absolute; bottom:0; left:0; right:0; background:var(--success-gradient); transition:height 0.5s cubic-bezier(0.4,0,0.2,1); border-radius:0 0 7px 7px; }
.hp-fill { height:100%; width:auto; border-radius:7px 0 0 7px; top:0; bottom:0; right:auto; }
.hp-label { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:white; text-shadow:0 1px 2px rgba(0,0,0,0.3); }
.date-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-2);
  border-radius: var(--radius-md);
  padding: 8px 12px;
  cursor: pointer;
  font-size: var(--fs-xs);
  white-space: nowrap;
  transition: var(--transition-fast);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 56px;
  font-family: inherit;
}
.date-btn:hover { border-color: var(--border-strong); color: var(--text); }
.date-btn:active { transform:scale(0.96); }
.date-btn.active {
  background: var(--text);
  border-color: var(--text);
  color: var(--text-inverse);
}
.date-btn.today:not(.active) { border-color:var(--primary); }
.date-btn .day-name { font-weight: var(--fw-semibold); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
.date-btn .day-num { font-family: var(--font-serif); font-weight: var(--fw-medium); font-size: 16px; letter-spacing: var(--ls-tight); margin-top: 2px; }
.date-btn .badge { font-size: 10px; opacity: 0.8; margin-top: 2px; }
.date-btn.active .badge { opacity:1; }
.date-btn.active .day-name { opacity:1; }

/* ===== CLEANER FILTER — Pill chips ===== */
.cleaner-filter { display:flex; gap:6px; margin-top:10px; overflow-x:auto; padding-bottom:4px; }
.cleaner-chip {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-2);
  border-radius: var(--radius-pill);
  padding: 5px 12px;
  font-size: var(--fs-xs);
  font-weight: var(--fw-medium);
  cursor: pointer;
  transition: var(--transition-fast);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space:nowrap;
}
.cleaner-chip:hover { border-color: var(--border-strong); color: var(--text); }
.cleaner-chip:active { transform:scale(0.96); }
.cleaner-chip.active {
  background: var(--text);
  border-color: var(--text);
  color: var(--text-inverse);
}
.cleaner-dot { width:8px; height:8px; border-radius:50%; display:inline-block; box-shadow:0 0 4px rgba(0,0,0,0.2); }

/* ===== BOTTOM NAV — Floating glass bar ===== */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--card);
  border-top:1px solid var(--border);
  box-shadow:0 -1px 3px rgba(15, 23, 42, 0.04);
  border-radius:0; display:flex; z-index:200;
  padding:var(--sp-1) var(--sp-2);
  padding-bottom:calc(var(--sp-1) + env(safe-area-inset-bottom));
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:var(--sp-2) var(--sp-1);
  cursor:pointer;
  color:var(--text-3);
  font-size:var(--fs-xs); font-weight:var(--fw-medium);
  transition:var(--transition);
  gap:3px; border:none; background:none;
  border-radius:var(--radius-md);
  position:relative;
}
.nav-item:active { transform:scale(0.98); }
.nav-item.active { color:var(--primary); background:transparent; }
.nav-item.active .nav-icon { color:var(--primary); transform:scale(1.05); }
.nav-item .nav-icon { font-size:20px; line-height:1; transition:var(--transition); display:inline-flex; align-items:center; justify-content:center; }

/* ===== SVG ICONS (Lucide inline) ===== */
svg { flex-shrink:0; vertical-align:middle; }
.nav-item svg, .icon-btn svg { display:block; }
.icon-lg svg { width:22px; height:22px; }
.icon-sm svg { width:14px; height:14px; }
.dash-tab svg { margin-right:4px; vertical-align:-3px; }
h3 svg { margin-right:6px; vertical-align:-3px; color:var(--text2); }
.empty-hero-icon svg { color:var(--primary); opacity:0.7; }
.toast-success .toast-icon svg { color:var(--green); }
.toast-error .toast-icon svg { color:var(--red); }
.toast-warning .toast-icon svg { color:var(--orange); }
.toast-info .toast-icon svg { color:var(--blue); }
.onb-icon svg { color:var(--primary); }
.hm-stat-icon svg { vertical-align:-2px; }
.acc-title svg { margin-right:6px; vertical-align:-3px; color:var(--text2); }

/* ===== CONTAINER ===== */
#app { position:relative; z-index:1; }
.container { max-width:700px; margin:0 auto; padding:var(--sp-4); position:relative; z-index:1; }

/* ===== SEARCH BAR ===== */
.search-bar { margin:var(--sp-3) 0; position:relative; }
.search-bar input { width:100%; padding:10px 16px 10px 42px; border-radius:var(--radius-md); border:1px solid var(--border); font-size:var(--fs-md); background:var(--card); color:var(--text); outline:none; transition:var(--transition-fast); font-weight:var(--fw-regular); }
.search-bar input:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }
.search-bar .s-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:15px; color:var(--text-3); }

/* ===== PROGRESS BAR ===== */
.progress-bar { margin:var(--sp-2) 0 var(--sp-4); background:var(--card); border-radius:var(--radius-md); padding:var(--sp-4); border:1px solid var(--border); }
.progress-bar .p-label { font-size:var(--fs-sm); color:var(--text-2); margin-bottom:var(--sp-2); display:flex; justify-content:space-between; font-weight:var(--fw-semibold); }
.progress-bar .bar { height:8px; background:var(--bg-3); border-radius:var(--radius-pill); overflow:hidden; }
.progress-bar .fill { height:100%; background:var(--green); border-radius:var(--radius-pill); transition:width 0.6s cubic-bezier(0.4, 0, 0.2, 1); position:relative; }
.progress-bar .fill::after { content:''; position:absolute; top:0; left:0; right:0; bottom:0; background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%); animation:shimmer 2s infinite; }
@keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

/* ===== DAY SECTION — Glass cards ===== */
.day-section { margin-bottom:20px; animation:slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.day-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:var(--bg2); border-radius:var(--radius-md) var(--radius-md) 0 0; border:1px solid var(--border); border-bottom:none; }
.day-header .day-title { font-size:13px; font-weight:700; color:var(--text2); letter-spacing:-0.1px; }
.day-header .day-count { font-size:11px; font-weight:700; color:var(--text2); }

/* ===== TASK CARD — Clean & hierarchical ===== */
.checkout-card { background:white; padding:12px 14px; border-bottom:1px solid var(--border); border-left:4px solid transparent; display:flex; align-items:stretch; transition:var(--transition); cursor:pointer; position:relative; overflow:hidden; }
.checkout-card:last-child { border-radius:0 0 var(--radius-md) var(--radius-md); }
.checkout-card:active { background:var(--bg2); }
/* Status-based card styles */
.checkout-card[data-status="done"] { opacity:0.65; background:var(--green-light); }
.checkout-card[data-status="done"] .listing-name { text-decoration:line-through; }
.checkout-card[data-status="in_progress"] { background:var(--blue-light); border-left-color:var(--blue); }
.checkout-card[data-status="cancelled"] { opacity:0.55; background:var(--red-light); }
.checkout-card[data-status="cancelled"] .listing-name { text-decoration:line-through; color:var(--red); }
.checkout-card[data-status="urgent"] { background:rgba(220,38,38,0.04); border-left-color:var(--red); }
.checkout-card[data-status="unassigned"] { border-left-color:var(--orange); }
.checkout-card.pending-confirm { background:var(--orange-light); }
.checkout-card .swipe-cancel-bg { position:absolute; left:0; top:0; bottom:0; width:0; background:linear-gradient(90deg,rgba(239,68,68,0.15),rgba(239,68,68,0.05)); display:flex; align-items:center; padding-left:16px; pointer-events:none; transition:width 0.05s; z-index:0; }
.swipe-cancel-icon { font-size:18px; opacity:0; transition:opacity 0.15s; }
.swipe-cancel-icon.visible { opacity:1; }
.checkout-card.swiping { user-select:none; -webkit-user-select:none; }

/* ===== MORE MENU (bottom sheet) ===== */
.more-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9998; display:flex; align-items:flex-end; justify-content:center; }
.more-sheet { background:var(--card,#ffffff); border-radius:20px 20px 0 0; width:100%; max-width:600px; padding:10px 20px 30px; animation:moreSlideUp 0.22s cubic-bezier(0.22,1,0.36,1); box-shadow:0 -8px 30px rgba(0,0,0,0.15); }
@keyframes moreSlideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.more-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:4px auto 16px; }
.more-title { font-size:16px; font-weight:700; text-align:center; margin-bottom:16px; }
.more-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
@media (max-width:480px){ .more-grid { grid-template-columns:repeat(3,1fr); } }
.more-item { display:flex; flex-direction:column; align-items:center; gap:8px; background:transparent; border:none; cursor:pointer; padding:8px 4px; border-radius:12px; transition:var(--transition); }
.more-item:hover { background:var(--bg2); }
.more-item:active { transform:scale(0.95); }
.more-icon { width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; }
.more-label { font-size:12px; font-weight:600; color:var(--text2); }

/* ===== EMPTY HERO ===== */
.empty-hero { padding:var(--sp-12) var(--sp-5); text-align:center; }
.empty-hero-icon { color:var(--text-3); margin-bottom:var(--sp-4); display:flex; justify-content:center; align-items:center; }
.empty-hero-icon svg { width:56px; height:56px; color:var(--text-3); opacity:0.6; }
.empty-hero-title { font-size:var(--fs-lg); font-weight:var(--fw-semibold); color:var(--text); margin-bottom:var(--sp-2); }
.empty-hero-sub { font-size:var(--fs-md); color:var(--text-2); margin-bottom:var(--sp-5); line-height:var(--lh-base); }

/* ===== SYNC INDICATOR ===== */
.sync-indicator { font-size:10px; color:var(--text3); font-weight:500; display:inline-flex; align-items:center; gap:3px; opacity:0.75; }

/* ===== STATUS DOT — single source of truth ===== */
.status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:5px; }
.status-dot.todo { background:var(--text3); }
.status-dot.in_progress { background:var(--blue); animation:statusPulse 2s infinite; }
.status-dot.done { background:var(--green); }
.status-dot.cancelled { background:var(--red); }
.status-dot.urgent { background:var(--red); animation:statusPulse 1.5s infinite; }
.status-dot.unassigned { background:var(--orange); }
@keyframes statusPulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 currentColor} 50%{opacity:0.7;box-shadow:0 0 0 4px rgba(0,0,0,0.05)} }

/* Status badge for cancelled */
.status-badge { font-size:9px; font-weight:800; padding:2px 6px; border-radius:4px; letter-spacing:0.3px; }
.status-badge.cancelled { background:var(--red-light); color:var(--red); }

/* Hide legacy elements */
.urgency-dot { display:none; }
.card-num { display:none; }
.check-btn { display:none; }
.assign-select { display:none; }
.tag-pill.fee { display:none; }
.detail-btn { display:none; }

/* New card layout */
.card-content { display:flex; align-items:stretch; gap:10px; flex:1; min-width:0; }
.card-main { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
.card-cta-col { display:flex; align-items:center; flex-shrink:0; }

/* Row 1: status dot + property + time */
.card-row-1 { display:flex; align-items:center; gap:8px; }
.listing-name { font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-0.2px; flex:1; min-width:0; color:var(--text); margin-top:0; line-height:1.3; }

/* Row 2: guest + type + cleaner */
.card-row-2 { display:flex; align-items:center; gap:4px; padding-left:18px; }
.guest-name { font-size:12px; font-weight:500; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* Row 3: alert line */
.card-row-3 { padding-left:18px; }

/* Timer row */
.card-row-timer { padding-left:18px; display:flex; align-items:center; gap:6px; }

/* Tag pills */
.tag-pill { font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; background:var(--bg); color:var(--text2); white-space:nowrap; }
.tag-pill.type { background:var(--primary-light); color:var(--primary); }
.est-time { color:var(--text3); font-size:10px; }

/* Next guest badges */
.next-guest { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:600; }
.next-guest.same-day { background:var(--red-light); color:var(--red); }
.next-guest.next-day { background:var(--orange-light); color:var(--orange); }

/* CTA buttons */
.card-cta { padding:8px 16px; border-radius:var(--radius-sm); font-size:var(--fs-sm); font-weight:700; cursor:pointer; border:none; white-space:nowrap; transition:var(--transition); }
.card-cta:active { transform:scale(0.95); opacity:0.8; }
.card-cta.start { background:var(--primary); color:white; font-size:13px; }
.card-cta.stop { background:var(--red); color:white; }
.card-cta.assign { background:var(--orange-light); color:var(--orange); border:1px solid rgba(217,119,6,0.15); }
.card-cta.restore { background:var(--red-light); color:var(--red); border:1px solid rgba(220,38,38,0.1); }
.card-cta.undo { background:var(--bg); color:var(--text3); font-size:11px; padding:5px 12px; }
.card-cta.done-direct { background:var(--green-light); color:var(--green); font-size:11px; padding:5px 12px; }
.card-cta.pause { background:var(--orange-light,rgba(245,158,11,0.12)); color:var(--orange,#f59e0b); padding:8px 12px; margin-right:4px; }
.card-cta.resume { background:var(--primary); color:white; padding:8px 12px; margin-right:4px; }
.btn-timer { background:var(--primary); color:white; border:none; padding:8px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; margin-right:6px; }
.btn-timer-stop { background:var(--red,#ef4444); color:white; border:none; padding:8px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; }
.timer-running { display:inline-block; background:var(--blue-light,rgba(96,165,250,0.12)); color:var(--blue,#3b82f6); padding:4px 10px; border-radius:6px; font-weight:600; margin-right:6px; font-size:12px; }
.timer-paused { display:inline-block; background:var(--orange-light,rgba(245,158,11,0.12)); color:var(--orange,#f59e0b); padding:4px 10px; border-radius:6px; font-weight:600; margin-right:6px; font-size:12px; }
.timer-done { color:var(--green,#22c55e); font-weight:600; font-size:12px; }
.cmdk-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; display:flex; align-items:flex-start; justify-content:center; padding-top:15vh; }
.cmdk-box { background:var(--card,#fff); border-radius:14px; width:90%; max-width:600px; box-shadow:0 24px 64px rgba(0,0,0,0.3); overflow:hidden; border:1px solid var(--border,#e0e0e0); }
.cmdk-input { width:100%; border:none; outline:none; padding:18px 20px; font-size:16px; background:transparent; color:var(--text,#1a1a2e); border-bottom:1px solid var(--border,#e5e7eb); box-sizing:border-box; }
.cmdk-results { max-height:50vh; overflow-y:auto; padding:8px 0; }
.cmdk-group { padding:4px 0; }
.cmdk-group-title { font-size:11px; color:var(--text3,#888); padding:6px 20px 4px; text-transform:uppercase; letter-spacing:0.8px; font-weight:700; }
.cmdk-item { padding:10px 20px; cursor:pointer; display:flex; align-items:center; gap:12px; font-size:14px; color:var(--text,#1a1a2e); }
.cmdk-item:hover, .cmdk-item.active { background:var(--primary-light,rgba(124,58,237,0.08)); }
.cmdk-item .icon { font-size:16px; width:22px; text-align:center; }
.cmdk-item .title { flex:1; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cmdk-item .meta { font-size:11px; color:var(--text3,#888); flex-shrink:0; max-width:45%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cmdk-empty { padding:30px 20px; text-align:center; color:var(--text3,#888); font-size:13px; }
.cmdk-hint { padding:8px 20px; font-size:11px; color:var(--text3,#888); border-top:1px solid var(--border,#e5e7eb); display:flex; justify-content:space-between; }
.cmdk-hint kbd { background:var(--bg2,#f5f5f7); border:1px solid var(--border,#e5e7eb); border-radius:4px; padding:1px 6px; font-family:inherit; font-size:10px; }
.cmdk-trigger { background:var(--bg2,#f5f5f7); color:var(--text3,#888); border:1px solid var(--border,#e5e7eb); border-radius:6px; padding:4px 10px; font-size:11px; font-weight:600; cursor:pointer; margin-right:4px; }
.cmdk-trigger:hover { background:var(--primary-light); color:var(--primary); }
@media (max-width:600px){ .cmdk-trigger { display:none; } }

/* Confirm message */
.confirm-msg { font-size:11px; color:var(--orange); font-weight:700; margin-top:4px; padding-left:18px; }

/* Assign picker overlay */
.assign-picker-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.3); z-index:1000; display:flex; align-items:flex-end; justify-content:center; }
.assign-picker { background:white; border-radius:var(--radius-lg) var(--radius-lg) 0 0; width:100%; max-width:480px; padding:20px 16px; max-height:60vh; overflow-y:auto; }
.assign-picker h3 { font-size:14px; font-weight:700; margin:0 0 12px; color:var(--text); }
.assign-picker-item { display:flex; align-items:center; gap:10px; padding:12px 8px; border-radius:var(--radius-sm); cursor:pointer; }
.assign-picker-item:active { background:var(--bg); }
.assign-picker-item .picker-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.assign-picker-item .picker-name { font-size:14px; font-weight:600; color:var(--text); }
.assign-picker-item .picker-count { font-size:12px; color:var(--text3); margin-left:auto; }

/* ===== TIMER ===== */
.timer-badge { display:inline-flex; align-items:center; gap:3px; font-size:var(--fs-xs); font-weight:700; padding:2px 8px; border-radius:var(--radius-sm); }
.timer-badge.running { background:var(--primary-light); color:var(--primary); }
.timer-badge.done { background:var(--green-light); color:var(--green); }
.timer-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:3px 8px; font-size:10px; cursor:pointer; color:var(--text); font-weight:600; transition:var(--transition); }
.timer-btn:active { transform:scale(0.95); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ===== EXPAND DETAIL — Glass panel ===== */
.detail-btn { background:var(--primary-light); border:none; border-radius:6px; padding:2px 8px; font-size:10px; cursor:pointer; color:var(--primary); font-weight:700; transition:var(--transition); }
.detail-btn:hover { background:var(--primary); color:white; }
.detail-btn:active { transform:scale(0.95); }
.card-detail { background:rgba(124,58,237,0.02); border-top:1px solid rgba(0,0,0,0.06); padding:16px 18px; }
.detail-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.checklist-item { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px; cursor:pointer; font-weight:500; }
.cl-check { width:20px; height:20px; border-radius:6px; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; transition:var(--transition); flex-shrink:0; }
.cl-done .cl-check { background:var(--success-gradient); border-color:transparent; color:white; box-shadow:0 2px 6px rgba(16,185,129,0.3); }
.cl-done .cl-label { text-decoration:line-through; color:var(--text3); }
.cl-progress { height:4px; background:var(--border); border-radius:4px; margin-top:6px; overflow:hidden; }
.cl-fill { height:100%; background:var(--success-gradient); border-radius:4px; transition:width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.note-item { background:var(--orange-light); padding:8px 12px; border-radius:10px; margin-bottom:6px; font-size:12px; border:1px solid rgba(245,158,11,0.1); font-weight:500; }
.note-meta { font-size:9px; color:var(--text3); margin-top:3px; font-weight:500; }
.note-input-row { display:flex; gap:8px; margin-top:8px; }
.note-input-row input { flex:1; padding:8px 12px; border:1px solid var(--border); border-radius:10px; font-size:13px; outline:none; background:var(--glass); color:var(--text); font-weight:500; transition:var(--transition); }
.note-input-row input:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }
.note-input-row button { background:var(--primary); color:var(--text-inverse); border:none; padding:8px 16px; border-radius:var(--radius-md); font-size:var(--fs-sm); cursor:pointer; font-weight:var(--fw-semibold); transition:var(--transition); }
.note-input-row button:hover { background:var(--primary-hover); }
.note-input-row button:active { transform:translateY(1px); }
.photo-grid { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.photo-thumb { width:52px; height:52px; border-radius:10px; background:var(--glass); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text3); cursor:pointer; border:1px solid var(--border); transition:var(--transition); }
.photo-thumb:hover { border-color:var(--primary); transform:scale(1.05); }
.photo-upload-btn { width:52px; height:52px; border-radius:10px; border:2px dashed var(--border); display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--text3); cursor:pointer; transition:var(--transition); }
.photo-upload-btn:hover { border-color:var(--primary); color:var(--primary); }

/* ===== DASHBOARD — Glass panels ===== */
.dash-card { background:var(--card); border-radius:var(--radius-md); padding:var(--sp-4); margin-bottom:var(--sp-3); border:1px solid var(--border); transition:var(--transition); }
.dash-card:hover { box-shadow:var(--shadow-sm); }
.dash-card h3 { font-size:var(--fs-md); font-weight:var(--fw-semibold); margin-bottom:var(--sp-3); letter-spacing:var(--ls-tight); color:var(--text); }
.dash-stat-row { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.dash-stat { flex:1; min-width:80px; text-align:center; background:rgba(124,58,237,0.03); border-radius:14px; padding:14px 10px; border:1px solid rgba(0,0,0,0.06); transition:var(--transition); }
.dash-stat:hover { transform:translateY(-2px); box-shadow:var(--card-shadow); }
.dash-stat .ds-num { font-size:26px; font-weight:900; color:var(--text); letter-spacing:-0.5px; }
.dash-stat .ds-label { font-size:9px; color:var(--text3); text-transform:uppercase; margin-top:3px; font-weight:700; letter-spacing:0.5px; }
.cleaner-stat-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.cleaner-stat-row:last-child { border-bottom:none; }
.cs-name { font-weight:700; font-size:13px; flex:1; display:flex; align-items:center; gap:6px; }
.cs-bar { flex:2; height:7px; background:rgba(124,58,237,0.1); border-radius:5px; overflow:hidden; }
.cs-fill { height:100%; border-radius:5px; transition:width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
.cs-count { font-size:12px; font-weight:700; min-width:50px; text-align:right; color:var(--text2); }
.chart-container { position:relative; height:200px; margin:12px 0; }

/* ===== SETTINGS — Glass panels ===== */
.settings-panel { background:var(--card); border-radius:var(--radius-md); padding:var(--sp-4); margin-bottom:var(--sp-3); border:1px solid var(--border); transition:var(--transition); }
.settings-panel:hover { box-shadow:var(--shadow-sm); }
.settings-panel h3 { font-size:var(--fs-md); font-weight:var(--fw-semibold); margin-bottom:var(--sp-3); letter-spacing:var(--ls-tight); color:var(--text); }
.cleaner-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.cleaner-row:last-child { border-bottom:none; }
.cleaner-row .c-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; box-shadow:0 0 4px rgba(0,0,0,0.15); }
.cleaner-row .c-name { flex:1; font-weight:700; font-size:13px; }
.cleaner-row .c-phone { font-size:11px; color:var(--text3); font-weight:500; }
.cleaner-row .c-pin { font-size:11px; color:var(--primary); font-weight:700; }
.cleaner-row button { background:none; border:none; cursor:pointer; font-size:14px; padding:4px; transition:var(--transition); }
.cleaner-row button:active { transform:scale(0.9); }
.add-form { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.add-form input,.add-form select { padding:8px 12px; border:1px solid rgba(0,0,0,0.1); border-radius:10px; font-size:13px; outline:none; background:white; color:var(--text); font-weight:500; transition:var(--transition); }
.add-form input:focus,.add-form select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(124,58,237,0.2); }
.add-form input:first-child { flex:1; min-width:100px; }
.add-form button { background:var(--primary); color:var(--text-inverse); border:none; padding:10px 18px; border-radius:var(--radius-md); font-size:var(--fs-md); cursor:pointer; font-weight:var(--fw-semibold); transition:var(--transition); box-shadow:var(--shadow-xs); }
.add-form button:hover { background:var(--primary-hover); }
.add-form button:active { transform:translateY(1px); }

/* ===== PRICING TABLE ===== */
.pricing-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; font-weight:500; }
.pricing-row:last-child { border-bottom:none; }
.pricing-row .pr-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pricing-row input { width:75px; padding:6px 8px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:var(--fs-sm); text-align:center; background:var(--glass); color:var(--text); font-weight:600; transition:var(--transition); }
.pricing-row input:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }

/* ===== HISTORY ===== */
.log-item { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; align-items:flex-start; font-weight:500; }
.log-item:last-child { border-bottom:none; }
.log-icon { width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; background:var(--primary-light); }
.log-info { flex:1; }
.log-time { font-size:10px; color:var(--text3); font-weight:500; }

/* ===== PIN SCREEN — Glass login ===== */
.pin-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; padding:20px; }
.pin-screen h2 { font-size:26px; margin-bottom:10px; font-weight:900; letter-spacing:-0.5px; }
.pin-screen p { color:var(--text2); margin-bottom:24px; font-size:14px; font-weight:500; }
.pin-input { width:200px; text-align:center; font-size:32px; letter-spacing:14px; padding:14px; border:2px solid rgba(0,0,0,0.1); border-radius:var(--radius-md); background:white; color:var(--text); outline:none; font-weight:800; transition:var(--transition); }
.pin-input:focus { border-color:var(--primary); box-shadow:0 0 0 4px var(--primary-light), var(--card-shadow); }
.pin-error { color:var(--red); font-size:12px; margin-top:10px; font-weight:600; }

/* ===== SCORE BADGE ===== */
.score-badge { display:inline-flex; align-items:center; gap:3px; font-size:var(--fs-xs); font-weight:700; padding:3px 8px; border-radius:var(--radius-sm); }
.score-badge.high { background:var(--green-light); color:var(--green); }
.score-badge.mid { background:var(--orange-light); color:var(--orange); }
.score-badge.low { background:var(--red-light); color:var(--red); }

/* ===== EMPTY / LOADING — Premium states ===== */
.empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }
.empty-state .msg { font-size:15px; font-weight:500; }
.loading { text-align:center; padding:80px 20px; color:var(--text3); }
.loading .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 16px; }
@keyframes spin { to{transform:rotate(360deg)} }
.error-state { text-align:center; padding:60px 20px; }
.error-state .icon { font-size:48px; margin-bottom:12px; }
.error-state .msg { font-size:15px; color:var(--primary); margin-bottom:16px; font-weight:600; }
.error-state button { background:var(--primary); color:var(--text-inverse); border:none; padding:12px 24px; border-radius:var(--radius-md); font-size:var(--fs-md); cursor:pointer; font-weight:var(--fw-semibold); box-shadow:var(--shadow-xs); transition:var(--transition); }
.error-state button:hover { background:var(--primary-hover); box-shadow:var(--shadow-sm); }
.error-state button:active { transform:translateY(1px); }

/* ===== TOAST — Glass notification ===== */
/* Legacy .toast replaced by .toast-stack + .toast-item (see below) */
.undo-toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(80px); background:#1e1b4b; color:white; padding:12px 20px; border-radius:var(--radius-md); font-size:14px; font-weight:600; z-index:300; opacity:0; transition:all 0.3s ease; pointer-events:none; display:flex; align-items:center; gap:16px; box-shadow:0 8px 32px rgba(0,0,0,0.25); }
.undo-toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
.undo-toast button { background:var(--primary); color:white; border:none; border-radius:6px; padding:6px 16px; font-size:13px; font-weight:800; cursor:pointer; letter-spacing:0.5px; }
.confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:250; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.15s ease; }
.confirm-box { background:white; border-radius:var(--radius-lg); padding:24px; max-width:300px; width:90%; text-align:center; box-shadow:0 16px 48px rgba(0,0,0,0.2); }
.confirm-box h3 { margin-bottom:8px; font-size:16px; }
.confirm-box p { color:var(--text2); font-size:13px; margin-bottom:16px; }
.confirm-box .btn-row { display:flex; gap:8px; justify-content:center; }
.confirm-box button { flex:1; padding:10px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; border:none; }
.confirm-box .btn-cancel { background:var(--bg-2); color:var(--text-2); border:1px solid var(--border); }
.confirm-box .btn-confirm { background:var(--primary); color:var(--text-inverse); }

/* ===== CONFETTI ===== */
.confetti { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:250; }

/* ===== MODAL — Frosted overlay ===== */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.35); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); z-index:300; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s ease; }
.modal-overlay img { max-width:90vw; max-height:90vh; border-radius:var(--radius-md); box-shadow:0 16px 64px rgba(0,0,0,0.3); }
.modal-close { position:fixed; top:20px; right:20px; color:white; font-size:28px; cursor:pointer; z-index:301; background:rgba(255,255,255,0.15); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(8px); }

/* ===== MONTH SELECTOR ===== */
.month-selector { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:8px; }
.month-selector button { background:var(--glass); border:1px solid var(--border); font-size:20px; cursor:pointer; color:var(--text); padding:6px 12px; border-radius:10px; font-weight:700; transition:var(--transition); }
.month-selector button:active { transform:scale(0.9); }
.month-selector h3 { margin:0; min-width:170px; text-align:center; font-size:17px; font-weight:800; letter-spacing:-0.3px; }

/* ===== EXPORT BUTTONS ===== */
.export-btns { display:flex; gap:8px; margin:12px 0; }
.export-btn { background:var(--glass); border:1px solid var(--border); border-radius:10px; padding:8px 16px; font-size:12px; font-weight:700; cursor:pointer; color:var(--text); display:flex; align-items:center; gap:5px; transition:var(--transition); }
.export-btn:hover { background:var(--primary-light); border-color:var(--primary); color:var(--primary); transform:translateY(-1px); }
.export-btn:active { transform:scale(0.95); }
.btn-export { background:var(--glass,#fff); border:1px solid var(--border,#e0e0e0); color:var(--text,#1a1a2e); padding:8px 14px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.btn-export:hover { background:var(--primary,#7c3aed); color:white; border-color:var(--primary,#7c3aed); }

/* ===== ISSUE CARDS — Glass with accent border ===== */
.issue-card { background:var(--card); border-radius:var(--radius-md); padding:var(--sp-4); margin-bottom:var(--sp-3); border:1px solid var(--border); border-left:4px solid var(--orange); transition:var(--transition); }
.issue-card:hover { box-shadow:var(--shadow-sm); }
.issue-card.urgent { border-left-color:var(--red); }
.issue-card.high { border-left-color:var(--orange); }
.issue-card.medium { border-left-color:var(--amber); }
.issue-card.low { border-left-color:var(--green); }
.issue-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:var(--sp-2); }
.issue-title { font-weight:var(--fw-semibold); font-size:var(--fs-md); letter-spacing:var(--ls-tight); color:var(--text); }
.issue-severity { font-size:var(--fs-xs); font-weight:var(--fw-semibold); padding:2px 8px; border-radius:var(--radius-sm); text-transform:uppercase; letter-spacing:var(--ls-wide); }
.issue-severity.urgent { background:var(--red-light); color:var(--red); }
.issue-severity.high { background:var(--orange-light); color:var(--orange); }
.issue-severity.medium { background:var(--amber-light); color:var(--amber); }
.issue-severity.low { background:var(--green-light); color:var(--green); }
.issue-meta { font-size:var(--fs-xs); color:var(--text-2); margin-bottom:var(--sp-1); font-weight:var(--fw-medium); }
.issue-desc { font-size:var(--fs-sm); color:var(--text); font-weight:var(--fw-regular); line-height:var(--lh-base); }
.issue-actions { display:flex; gap:var(--sp-2); margin-top:var(--sp-3); }
.issue-actions button { font-size:var(--fs-sm); padding:6px 14px; border-radius:var(--radius-md); border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-weight:var(--fw-medium); transition:var(--transition); }
.issue-actions button:hover { background:var(--bg-2); border-color:var(--border-strong); }
.issue-actions button:active { transform:translateY(1px); }
.issue-actions button.resolve { background:var(--green); color:var(--text-inverse); border:none; box-shadow:var(--shadow-xs); }
.issue-actions button.resolve:hover { background:#15803d; }
.issue-form { background:var(--card); border-radius:var(--radius-md); padding:var(--sp-4); margin-bottom:var(--sp-3); border:1px solid var(--border); }
.issue-form h3 { font-size:var(--fs-md); font-weight:var(--fw-semibold); margin-bottom:var(--sp-3); }
.issue-form input,.issue-form textarea,.issue-form select { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-md); font-size:var(--fs-md); background:var(--card); color:var(--text); margin-bottom:var(--sp-2); outline:none; font-family:inherit; font-weight:var(--fw-regular); transition:var(--transition-fast); }
.issue-form input:focus,.issue-form textarea:focus,.issue-form select:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }
.issue-form textarea { min-height:60px; resize:vertical; }
.issue-form .form-row { display:flex; gap:var(--sp-2); }
.issue-form .form-row select { flex:1; }
.issue-submit { background:var(--primary); color:var(--text-inverse); border:none; padding:12px 24px; border-radius:var(--radius-md); font-size:var(--fs-md); font-weight:var(--fw-semibold); cursor:pointer; width:100%; box-shadow:var(--shadow-xs); transition:var(--transition); }
.issue-submit:hover { background:var(--primary-hover); box-shadow:var(--shadow-sm); }
.issue-submit:active { transform:translateY(1px); }

/* ===== RECURRING TASKS ===== */
.recurring-card { background:var(--card); border-radius:var(--radius-md); padding:var(--sp-4); margin-bottom:var(--sp-3); border:1px solid var(--border); display:flex; align-items:center; gap:var(--sp-3); transition:var(--transition); }
.recurring-card:hover { box-shadow:var(--shadow-sm); }
.recurring-info { flex:1; }
.recurring-name { font-weight:var(--fw-semibold); font-size:var(--fs-md); letter-spacing:var(--ls-tight); color:var(--text); }
.recurring-meta { font-size:var(--fs-xs); color:var(--text-2); margin-top:3px; font-weight:var(--fw-regular); }
.recurring-due { font-size:var(--fs-xs); font-weight:var(--fw-semibold); padding:2px 8px; border-radius:var(--radius-sm); text-transform:uppercase; letter-spacing:var(--ls-wide); }
.recurring-due.overdue { background:var(--red-light); color:var(--red); }
.recurring-due.today { background:var(--orange-light); color:var(--orange); }
.recurring-due.upcoming { background:var(--green-light); color:var(--green); }
.recurring-actions { display:flex; gap:var(--sp-1); }
.recurring-actions button { font-size:18px; background:none; border:none; cursor:pointer; padding:var(--sp-1); transition:var(--transition); border-radius:var(--radius-sm); }
.recurring-actions button:hover { background:var(--bg-2); }
.recurring-actions button:active { transform:scale(0.98); }
.recurring-form { background:var(--card); border-radius:var(--radius-md); padding:var(--sp-4); margin-bottom:var(--sp-3); border:1px solid var(--border); }
.recurring-form h3 { font-size:var(--fs-md); font-weight:var(--fw-semibold); margin-bottom:var(--sp-3); }
.recurring-form input,.recurring-form select { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-md); font-size:var(--fs-md); background:var(--card); color:var(--text); margin-bottom:var(--sp-2); outline:none; font-weight:var(--fw-regular); transition:var(--transition-fast); }
.recurring-form input:focus,.recurring-form select:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }

/* ===== ESTIMATED TIME ===== */
.est-time { font-size:10px; color:var(--text3); font-style:italic; font-weight:500; }

/* ===== PHOTO REQUIRED ===== */
.photo-required { color:var(--primary); font-size:10px; font-weight:700; margin-left:4px; }
.cl-photo-btn { background:var(--primary-light); color:var(--primary); border:1px solid var(--primary); border-radius:var(--radius-sm); padding:3px 10px; font-size:var(--fs-xs); cursor:pointer; margin-left:auto; font-weight:700; transition:var(--transition); }
.cl-photo-btn:active { transform:scale(0.95); }
.cl-photo-btn.uploaded { background:var(--green-light); color:var(--green); border-color:var(--green); }

/* ===== LANGUAGE SELECTOR ===== */
/* Language selector removed — English only */

/* ===== CALENDAR — Glass grid ===== */
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-top:10px; }
.cal-header { text-align:center; font-size:10px; font-weight:800; color:var(--text3); padding:6px; text-transform:uppercase; letter-spacing:0.5px; }
.cal-day { background:var(--glass); border-radius:10px; padding:6px 4px; min-height:62px; font-size:11px; border:1px solid var(--border); cursor:pointer; transition:var(--transition); }
.cal-day:hover { border-color:var(--primary); transform:scale(1.02); }
.cal-day.today { border-color:var(--primary); border-width:2px; box-shadow:0 0 0 2px var(--primary-light); }
.cal-day.empty { background:transparent; border:none; cursor:default; }
.cal-day .cal-num { font-weight:800; font-size:12px; margin-bottom:3px; }
.cal-day .cal-count { font-size:9px; background:var(--primary-light); color:var(--primary); border-radius:6px; padding:1px 5px; display:inline-block; font-weight:700; }
.cal-day .cal-done-count { font-size:9px; background:var(--green-light); color:var(--green); border-radius:6px; padding:1px 5px; display:inline-block; margin-left:2px; font-weight:700; }
.cal-dots { display:flex; gap:2px; margin-top:3px; flex-wrap:wrap; }
.cal-dot { width:6px; height:6px; border-radius:50%; }

/* ===== CLEANER STATS ===== */
.stat-big { text-align:center; padding:var(--sp-6); background:var(--card); border-radius:var(--radius-md); margin-bottom:var(--sp-3); border:1px solid var(--border); }
.stat-big .big-num { font-size:var(--fs-3xl); font-weight:var(--fw-bold); color:var(--primary); letter-spacing:var(--ls-tight); }
.stat-big .big-label { font-size:var(--fs-xs); color:var(--text-3); text-transform:uppercase; margin-top:var(--sp-1); font-weight:var(--fw-semibold); letter-spacing:var(--ls-wide); }
.stat-row-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-2); margin-bottom:var(--sp-3); }
.stat-mini { text-align:center; padding:var(--sp-4); background:var(--card); border-radius:var(--radius-md); border:1px solid var(--border); transition:var(--transition); }
.stat-mini:hover { box-shadow:var(--shadow-sm); }
.stat-mini .mini-num { font-size:var(--fs-2xl); font-weight:var(--fw-bold); color:var(--text); letter-spacing:var(--ls-tight); }
.stat-mini .mini-label { font-size:var(--fs-xs); color:var(--text-3); text-transform:uppercase; margin-top:3px; font-weight:var(--fw-semibold); letter-spacing:var(--ls-wide); }

/* ===== PHOTO COMPARISON ===== */
.photo-compare { display:flex; gap:10px; margin:10px 0; }
.photo-compare .compare-col { flex:1; text-align:center; }
.photo-compare .compare-label { font-size:10px; font-weight:800; color:var(--text3); text-transform:uppercase; margin-bottom:5px; letter-spacing:0.5px; }
.photo-compare img { width:100%; border-radius:10px; border:1px solid var(--border); }
.photo-compare .compare-empty { width:100%; height:80px; border-radius:10px; border:2px dashed var(--border); display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--text3); cursor:pointer; transition:var(--transition); }
.photo-compare .compare-empty:hover { border-color:var(--primary); color:var(--primary); }

/* ===== QR CODE ===== */
.qr-container { text-align:center; padding:12px; background:white; border-radius:var(--radius-md); display:inline-block; box-shadow:var(--card-shadow); }
.qr-container canvas { display:block; }
.qr-label { font-size:10px; color:#333; margin-top:4px; font-weight:600; }

/* ===== GUEST REVIEW ===== */
.review-card { background:var(--glass); border-radius:var(--radius-md); padding:14px; margin-bottom:10px; box-shadow:var(--card-shadow); border:1px solid var(--border); }
.review-stars { color:#fbbf24; font-size:15px; letter-spacing:3px; }
.review-text { font-size:13px; color:var(--text); margin-top:6px; font-style:italic; font-weight:500; }
.review-source { font-size:10px; color:var(--text3); margin-top:5px; font-weight:500; }

/* ===== NOTIFICATION BANNER ===== */
.notif-banner { background:var(--primary-light); border:1px solid rgba(233,69,96,0.2); border-radius:var(--radius-md); padding:12px 16px; margin-bottom:12px; display:flex; align-items:center; gap:12px; font-size:13px; font-weight:500; }
.notif-banner button { background:var(--primary); color:var(--text-inverse); border:none; padding:8px 16px; border-radius:var(--radius-md); font-size:var(--fs-sm); font-weight:var(--fw-semibold); cursor:pointer; white-space:nowrap; box-shadow:var(--shadow-xs); transition:var(--transition); }
.notif-banner button:hover { background:var(--primary-hover); }
.notif-banner button:active { transform:translateY(1px); }

/* ===== PROPERTY CHECKLIST EDITOR ===== */
.prop-cl-editor { background:var(--bg3); border-radius:var(--radius-md); padding:12px; margin-top:10px; border:1px solid var(--border); }
.prop-cl-item { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; font-weight:500; }
.prop-cl-item button { background:none; border:none; color:var(--red); cursor:pointer; font-size:14px; transition:var(--transition); }
.prop-cl-item button:active { transform:scale(0.85); }
.prop-cl-add { display:flex; gap:8px; margin-top:8px; }
.prop-cl-add input { flex:1; padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:var(--fs-sm); background:var(--glass); color:var(--text); font-weight:500; }

/* ===== AUTO-ASSIGN ===== */
.auto-assign-btn { background:var(--primary); color:var(--text-inverse); border:none; border-radius:var(--radius-md); padding:10px 20px; font-size:var(--fs-md); font-weight:var(--fw-semibold); cursor:pointer; display:inline-flex; align-items:center; gap:var(--sp-2); margin:var(--sp-2) 0; box-shadow:var(--shadow-xs); transition:var(--transition); }
.auto-assign-btn:hover { background:var(--primary-hover); box-shadow:var(--shadow-sm); }
.auto-assign-btn:active { transform:translateY(1px); }

/* ===== WHATSAPP ===== */
.wa-btn { background:linear-gradient(135deg,#25D366,#20BD5C); color:white; border:none; border-radius:10px; padding:8px 14px; font-size:12px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:5px; box-shadow:0 2px 8px rgba(37,211,102,0.3); transition:var(--transition); }
.wa-btn:active { transform:scale(0.95); }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); backdrop-filter:blur(8px); z-index:500; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.wa-chooser { background:white; border:1px solid rgba(0,0,0,0.08); border-radius:var(--radius-lg); padding:24px; width:280px; display:flex; flex-direction:column; align-items:center; box-shadow:0 16px 48px rgba(0,0,0,0.15); }
.wa-choice-btn { width:100%; padding:14px; border-radius:14px; border:2px solid var(--border); background:white; cursor:pointer; display:flex; align-items:center; gap:12px; margin-bottom:10px; transition:var(--transition); }
.wa-choice-btn:active { transform:scale(0.97); }
.wa-choice-btn.personal:hover { border-color:#25D366; background:rgba(37,211,102,0.06); }
.wa-choice-btn.business:hover { border-color:#128C7E; background:rgba(18,140,126,0.06); }
.wa-choice-icon { font-size:24px; }
.wa-choice-label { font-size:14px; font-weight:700; color:var(--text); }
.wa-remember { font-size:11px; color:var(--text2); display:flex; align-items:center; gap:6px; margin-top:4px; cursor:pointer; font-weight:500; }
.wa-remember input { accent-color:var(--primary); }

/* ===== MAINTENANCE — Glass cards ===== */
.mt-card { background:var(--card); border-radius:var(--radius-md); padding:var(--sp-4); margin-bottom:var(--sp-2); border:1px solid var(--border); border-left:4px solid var(--border); transition:var(--transition); cursor:pointer; }
.mt-card:hover { box-shadow:var(--shadow-sm); }
