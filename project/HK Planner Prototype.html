<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HK Planner — Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="prototype.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="proto-icons.jsx"></script>
  <script type="text/babel" src="proto-store.jsx"></script>
  <script type="text/babel" src="proto-shell.jsx"></script>
  <script type="text/babel" src="proto-today.jsx"></script>
  <script type="text/babel" src="proto-property.jsx"></script>
  <script type="text/babel" src="proto-inbox-ticket.jsx"></script>
  <script type="text/babel" src="proto-other.jsx"></script>
  <script type="text/babel" src="proto-owner.jsx"></script>
  <script type="text/babel" src="proto-onboarding.jsx"></script>
  <script type="text/babel" src="proto-liveops.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="proto-tweaks.jsx"></script>

  <script type="text/babel">
    const PAGES = {
      today:    () => <TodayPage/>,
      live:     () => <LiveOpsPage/>,
      property: () => <PropertyPage/>,
      inbox:    () => <InboxPage/>,
      ticket:   () => <TicketPage/>,
      tix:      () => <TicketsListPage/>,
      cal:      () => <CalendarPage/>,
      props:    () => <PropertiesPage/>,
      staff:    () => <TeamPage/>,
      reports:  () => <ReportsPage/>,
      settings: () => <SettingsPage/>,
      onboarding: () => <OnboardingPage/>,
      'owner-home': () => <OwnerPortal/>,
      'owner-prop': () => <OwnerPortal/>,
      'owner-stmt': () => <OwnerPortal/>,
      'owner-msgs': () => <OwnerPortal/>,
    };

    const Router = () => {
      const { route } = useStore();
      const Comp = PAGES[route.page] || PAGES.today;
      return <Comp/>;
    };

    const RoleSidebar = () => {
      const { role } = useStore();
      if (role === 'owner') return <OwnerSidebar ownerId="O1" />;
      return <Sidebar/>;
    };

    const Shell = () => {
      const { route } = useStore();
      // Onboarding is full-bleed — no sidebar/topbar
      if (route.page === 'onboarding') return <OnboardingPage/>;
      return (
        <div className="app">
          <RoleSidebar/>
          <div className="main">
            <Router/>
          </div>
        </div>
      );
    };

    const App = () => (
      <StoreProvider>
        <Shell/>
        <Toast/>
        <ProtoTweaks/>
      </StoreProvider>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
